                      if (item.comboSource && itemIdx[item.comboSource] && itemIdx[item.comboSource].purchased > 0) {
                        effectiveItem = { ...item, purchased: itemIdx[item.comboSource].purchased };
                        comboResolved = true;
                        comboSourceName = itemIdx[item.comboSource].name;
                      }
                      const status = deriveStatus(effectiveItem);
                      const notes = item.notes || '';
                      const isEssential = item.essential ? ' <span class="badge essential">esencial</span>' : '';
                      const comboIndicator = item.comboSource ? `<span class="combo-indicator" title="Cubierto por: ${stats.nameById[item.comboSource] || item.comboSource}"><svg class="icon icon-sm"><use href="#icon-link"/></svg> Cubierto por combo</span>` : '';
                      const customBadge = item._custom ? '<span class="custom-badge"><svg class="icon icon-sm"><use href="#icon-edit"/></svg> personalizado</span>' : '';

                      // Mode A: Avoid items
                      if (status === 'evitar') {
                        return `
                          <tr>
                            <td data-label="Ítem">${item.name}${comboIndicator}${isEssential}</td>
                            <td class="qty-cell" colspan="2" data-label="Cantidad">
                              <span class="avoid-text"><svg class="icon icon-sm"><use href="#icon-slash"/></svg> No comprar</span>
                            </td>
                            <td data-label="Estado"><span class="badge ${status}" aria-label="Estado: ${STATUS_LABELS[status]}">${STATUS_LABELS[status]}</span></td>
                            <td data-label="Notas" style="font-size:0.78rem;color:var(--text-light)">${notes}</td>
                          </tr>
                        `;
                      }

                      // Mode B: Combo resolved (readonly)
                      if (comboResolved) {
                        return `
                          <tr>
                            <td data-label="Ítem">${item.name}${comboIndicator}${isEssential}</td>
                            <td class="qty-cell" data-label="Sugerido">
                              <span class="suggested">${item.suggestedMin}-${item.suggestedMax}</span>
                            </td>
                            <td class="qty-cell" data-label="Tengo">
                              <span class="combo-qty" title="Cubierto por: ${comboSourceName}">${effectiveItem.purchased}</span>
                            </td>
                            <td data-label="Estado"><span class="badge ${status}" aria-label="Estado: ${STATUS_LABELS[status]}">${STATUS_LABELS[status]}</span></td>
                            <td data-label="Notas" style="font-size:0.78rem;color:var(--text-light)">${notes}</td>
                          </tr>
                        `;
                      }

                       // Mode C: Normal (interactive)
                        return `
                          <tr>
                            <td data-label="Ítem">
                              ${item.name}${customBadge}${comboIndicator}${isEssential}
                            </td>
                            <td class="qty-cell" data-label="Sugerido">
                              <span class="suggested">${item.suggestedMin}-${item.suggestedMax}</span>
                            </td>
                            <td class="qty-cell" data-label="Tengo">
                              ${item._custom ? `<button class="delete-custom-btn" data-action="delete-custom" data-id="${item.id}" data-cat="${cat.id}" aria-label="Eliminar ítem personalizado"><svg class="icon icon-sm"><use href="#icon-x"/></svg></button>` : ''}
                              <div class="stepper" style="display:inline-flex;align-items:center;gap:0;background:#fff;border:1.5px solid rgba(61,64,91,0.12);border-radius:32px;overflow:hidden;box-shadow:0 2px 8px rgba(61,64,91,0.08)">
                                <button class="stepper-btn" data-action="decrement" data-id="${item.id}" ${item.purchased <= 0 ? 'disabled' : ''} aria-label="Reducir cantidad" style="width:44px;height:44px;border:none;background:transparent;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#3D405B;border-radius:32px 0 0 32px">−</button>
                                <span class="stepper-value${item.purchased > 0 ? ' has-value' : ''}" style="min-width:32px;height:44px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:${item.purchased > 0 ? '#E07A5F' : '#3D405B'};background:#fff;border-left:1px solid rgba(61,64,91,0.12);border-right:1px solid rgba(61,64,91,0.12)">${item.purchased}</span>
                                <button class="stepper-btn" data-action="increment" data-id="${item.id}" aria-label="Aumentar cantidad" style="width:44px;height:44px;border:none;background:#81B29A;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;border-radius:0 32px 32px 0">+</button>
                              </div>
                            </td>
                            <td data-label="Estado"><span class="badge ${status}" aria-label="Estado: ${STATUS_LABELS[status]}">${STATUS_LABELS[status]}</span></td>
                            <td data-label="Notas" class="note-cell" data-action="edit-note" data-id="${item.id}" data-cat="${cat.id}" title="Click para editar nota" style="font-size:0.78rem;color:var(--text-light);cursor:pointer;max-width:120px">
                              <span class="note-text">${notes || '—'}</span>
                              <input class="note-input" type="text" value="${notes.replace(/"/g, '&quot;')}" data-id="${item.id}" style="display:none;width:100%;font-size:0.78rem;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-family:inherit">
                            </td>
                            <td data-label="" style="text-align:center;width:40px">
                              <button class="delete-item-btn" data-action="delete-item" data-id="${item.id}" data-cat="${cat.id}" data-name="${item.name.replace(/"/g, '&quot;')}" aria-label="Eliminar ítem" title="Eliminar ítem" style="background:none;border:none;color:#cbd5e1;cursor:pointer;padding:4px;opacity:0.25;transition:all 0.15s;display:inline-flex;align-items:center">
                                <svg class="icon icon-sm"><use href="#icon-trash"/></svg>
                              </button>
                            </td>
                          </tr>
                        `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
              <button class="add-item-btn" data-action="add-item" data-cat="${cat.id}" aria-label="Agregar ítem a ${cat.name}"><svg class="icon icon-sm"><use href="#icon-plus"/></svg> Agregar ítem</button>
              <div class="add-item-form" id="form-${cat.id}" style="display:none;">
                <input type="text" id="form-name-${cat.id}" placeholder="Nombre del ítem" required>
                <div style="display:flex; gap:8px;">
                  <input type="number" id="form-qty-${cat.id}" placeholder="Cantidad" min="0" max="99" value="0" style="flex:1;">
                  <select id="form-stage-${cat.id}" style="flex:1;">
                    <option value="pre-birth">Antes del nacimiento</option>
                    <option value="first-month">Primer mes</option>
                    <option value="3-6-months">3 a 6 meses</option>
                    <option value="6-9-months">6 a 9 meses</option>
                    <option value="9-12-months">9 a 12 meses</option>
                    <option value="avoid">Evitar</option>
                  </select>
                </div>
                <input type="text" id="form-notes-${cat.id}" placeholder="Notas (opcional)">
                <div style="display:flex; gap:8px; margin-top:8px;">
                  <button class="stepper-btn" data-action="submit-add" data-cat="${cat.id}" style="flex:1; background:var(--success); color:white; border-color:var(--success);">✓ Agregar</button>
                  <button class="stepper-btn" data-action="cancel-add" data-cat="${cat.id}" style="flex:1;">Cancelar</button>
                </div>
              </div>
            </div>
          </details>
        `;
      }).join('');
    }

    /**
     * Renders the gap analysis view (stub — will be fully implemented in Task 3.4).
     */
    function renderGapAnalysis(data, stats) {
      const container = document.getElementById('gapList');
      if (!container) return;

      const gaps = stats.gaps;
      if (gaps.length === 0) {
        container.innerHTML = '<p style="color:var(--accent);font-weight:600;"><svg class="icon"><use href="#icon-star"/></svg> ¡No hay ítems pendientes! Todo está cubierto.</p>';
        return;
      }

      const hasPreBirthGaps = gaps.some(gap => gap.stage === 'pre-birth');
      const ctaHtml = hasPreBirthGaps
        ? '<div class="gap-cta" aria-label="Alerta: items críticos que deben comprarse antes del nacimiento"><svg class="icon"><use href="#icon-alert"/></svg> ¡Comprar antes del nacimiento!</div>'
        : '';

      container.innerHTML = `${ctaHtml}<ul class="gap-list">${gaps.map(gap => {
        const isCritical = gap.stage === 'pre-birth';
        const criticalClass = isCritical ? ' critical' : '';
        return `
          <li class="gap-item${criticalClass}" aria-label="${gap.item}: faltan ${gap.missing}, etapa ${gap.stage}${isCritical ? ', crítico — comprar antes del nacimiento' : ''}">
            <span class="gap-name">${gap.item}</span>
            ${gap.essential ? '<span class="badge essential">esencial</span>' : ''}
            <span class="gap-cat">${gap.category}</span>
            <span class="gap-qty">Necesitas: ${gap.missing}</span>
            <span class="gap-stage stage-${gap.stage}">${gap.stage}</span>
          </li>
        `;
      }).join('')}</ul>`;
    }

    /**
     * Renders the extras section (stub — will be fully implemented in Task 3.5).
     */
    function renderExtras(data) {
      const container = document.getElementById('extrasList');
      const section = document.getElementById('extras');
      if (!container || !section) return;

      const extras = data.extras || [];

      if (extras.length === 0) {
        section.classList.add('extras-hidden');
        return;
      }

      section.classList.remove('extras-hidden');
      container.innerHTML = extras.map(extra => `
        <div class="extra-item">
          <span class="extra-name">${extra.name}</span>
          <span class="extra-qty">x${extra.quantity}</span>
          <span class="extra-reason">${extra.reason}</span>
          ${extra.notes ? `<span style="font-size:0.75rem;color:var(--text-light)">${extra.notes}</span>` : ''}
        </div>
      `).join('');
    }

    /**
     * Sets up the download button to export current state as JSON backup.
     */
    function setupDownloadButton() {
      const btn = document.getElementById('downloadBtn');
      if (!btn) return;

      btn.addEventListener('click', () => {
        if (!currentData) return;
        const json = JSON.stringify(currentData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'lista-leandro-jose-backup.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }

    /**
     * Deletes an item after confirmation. Resets purchased to 0 and removes override.
     */
    function deleteItem(catId, itemId, itemName) {
      if (!confirm(`¿Eliminar "${itemName}" de la lista?\n\nPodés volver a agregarlo después.`)) return;
      
      // Remove override
      if (currentOverrides[itemId] !== undefined) {
        delete currentOverrides[itemId];
      }
      
      // Remove from custom items if present
      if (currentCustomItems[catId]) {
        currentCustomItems[catId] = currentCustomItems[catId].filter(i => i.id !== itemId);
        if (currentCustomItems[catId].length === 0) delete currentCustomItems[catId];
      }
      
      saveState(currentOverrides, currentNotesOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
      refreshAll(catId);
      showToast('🗑 Eliminado');
    }

    /**
     * Shows a brief auto-save confirmation toast.
     */
    function showToast(message) {
      const toast = document.getElementById('saveToast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('visible'), 1800);
    }

    /**
     * Sets up the import button to load a JSON backup file.
     */
    function setupImportButton() {
      const btn = document.getElementById('importBtn');
      const fileInput = document.getElementById('importFile');
      if (!btn || !fileInput) return;

      btn.addEventListener('click', () => {
        fileInput.click();
      });

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            
            // Extract overrides from imported data
            const newOverrides = {};
            for (const cat of (imported.categories || [])) {
              for (const item of (cat.items || [])) {
                if (item.purchased > 0) {
                  // Only import items that have been purchased
                  newOverrides[item.id] = item.purchased;
                }
              }
            }

            // Extract custom items
            const newCustomItems = {};
            for (const cat of (imported.categories || [])) {
              const customInCat = (cat.items || []).filter(i => i._custom);
              if (customInCat.length > 0) {
                newCustomItems[cat.id] = customInCat;
              }
            }

            // Merge with existing — imported values take precedence
            const mergedOverrides = { ...currentOverrides, ...newOverrides };
            const mergedCustoms = { ...currentCustomItems };
            for (const [catId, items] of Object.entries(newCustomItems)) {
              mergedCustoms[catId] = [...(mergedCustoms[catId] || []), ...items];
            }

            // Save and refresh
            currentOverrides = mergedOverrides;
            currentCustomItems = mergedCustoms;
            saveState(currentOverrides, currentNotesOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
            refreshAll();

            // Reset file input
            fileInput.value = '';
          } catch (err) {
            alert('El archivo no es un respaldo válido: ' + err.message);
          }
        };
        reader.readAsText(file);
      });
    }

    /**
     * Toggles the legend visibility on mobile.
     */
    function setupLegendToggle() {
      const toggle = document.getElementById('toggleLegend');
      const legend = document.querySelector('.legend');
      if (!toggle || !legend) return;

      toggle.addEventListener('click', () => {
        legend.classList.toggle('visible');
        toggle.textContent = legend.classList.contains('visible') ? '✕' : 'ℹ️';
      });
    }

    /**
     * Wires up the category filter buttons.
     */
    function setupFilters() {
      const buttons = document.querySelectorAll('#categoryFilters button');
      // Initialize aria-pressed on the active button
      buttons.forEach(btn => {
        btn.setAttribute('aria-pressed', btn.classList.contains('active') ? 'true' : 'false');
      });

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          // Update active state
          buttons.forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-pressed', 'true');

          currentFilter = btn.dataset.stage || 'all';

          if (currentData && currentStats) {
            renderCategoryAccordion(currentData, currentStats, currentFilter);
          }
        });
      });
    }

    /* ═══════════════════════════════════════════
       ──  TASK 2.2/3.1: Add Form Helpers + Event Delegation  ──
       ═══════════════════════════════════════════ */

    /**
     * Muestra el formulario para agregar ítem en una categoría.
     * @param {string} catId
     */
    function showAddForm(catId) {
      const form = document.getElementById('form-' + catId);
      if (form) form.style.display = 'block';
      const btn = document.querySelector(`[data-action="add-item"][data-cat="${catId}"]`);
      if (btn) btn.style.display = 'none';
    }

    /**
     * Oculta el formulario para agregar ítem en una categoría.
     * @param {string} catId
     */
    function hideAddForm(catId) {
      const form = document.getElementById('form-' + catId);
      if (form) form.style.display = 'none';
      const btn = document.querySelector(`[data-action="add-item"][data-cat="${catId}"]`);
      if (btn) btn.style.display = '';
    }

    /**
     * Procesa el envío del formulario de agregar ítem.
     * @param {string} catId
     */
    function submitAddItem(catId) {
      const nameEl = document.getElementById('form-name-' + catId);
      const qtyEl = document.getElementById('form-qty-' + catId);
      const stageEl = document.getElementById('form-stage-' + catId);
      const notesEl = document.getElementById('form-notes-' + catId);

      const name = nameEl?.value?.trim();
      if (!name) {
        alert('El nombre del ítem es obligatorio.');
        return;
      }

      const itemData = {
        name: name,
        suggestedMin: parseInt(qtyEl?.value) || 1,
        suggestedMax: parseInt(qtyEl?.value) || 1,
        purchased: parseInt(qtyEl?.value) || 0,
        stage: stageEl?.value || 'pre-birth',
        notes: notesEl?.value?.trim() || '',
        essential: false
      };

      addCustomItem(catId, itemData);
      hideAddForm(catId);

      // Clear form
      if (nameEl) nameEl.value = '';
      if (qtyEl) qtyEl.value = '0';
      if (notesEl) notesEl.value = '';
    }

    /**
     * Configura event delegation en #categoryList para todos los controles interactivos.
     */
    function setupEventDelegation() {
      const container = document.getElementById('categoryList');
      if (!container) return;

      container.addEventListener('click', function(e) {
        // Handle note editing (click on note cell)
        const noteCell = e.target.closest('[data-action="edit-note"]');
        if (noteCell) {
          const span = noteCell.querySelector('.note-text');
          const input = noteCell.querySelector('.note-input');
          if (span && input) {
            span.style.display = 'none';
            input.style.display = 'block';
            input.focus();
            input.select();
          }
          return;
        }

        const btn = e.target.closest('button');
        if (!btn) return;

        const action = btn.dataset.action;
        const itemId = btn.dataset.id;
        const catId = btn.dataset.cat;

        if (action === 'increment') { changePurchased(itemId, +1); showToast('✓ Guardado'); }
        else if (action === 'decrement') { changePurchased(itemId, -1); showToast('✓ Guardado'); }
        else if (action === 'delete-custom') { deleteCustomItem(catId, itemId); showToast('✓ Eliminado'); }
        else if (action === 'delete-item') deleteItem(catId, itemId, btn.dataset.name);
        else if (action === 'add-item') showAddForm(catId);
        else if (action === 'submit-add') { submitAddItem(catId); showToast('✓ Ítem agregado'); }
        else if (action === 'cancel-add') hideAddForm(catId);
      });

      // Handle note input blur and enter key
      container.addEventListener('focusout', function(e) {
        const input = e.target.closest('.note-input');
        if (!input) return;
        const itemId = input.dataset.id;
        const span = input.parentElement.querySelector('.note-text');
        const noteText = input.value.trim();
        
        // Update display
        if (span) {
          span.textContent = noteText || '—';
          span.style.display = '';
          input.style.display = 'none';
        }
        
        // Save
        saveNote(itemId, noteText);
        showToast('✓ Nota guardada');
      });

      container.addEventListener('keydown', function(e) {
        const input = e.target.closest('.note-input');
        if (!input || e.key !== 'Enter') return;
        e.preventDefault();
        input.blur(); // triggers focusout → save
      });
    }

    /**
     * Displays a validation error banner.
     */
    function showError(errors) {
      const banner = document.getElementById('errorBanner');
      const list = document.getElementById('errorList');
      if (!banner || !list) return;

      banner.classList.add('visible');
      list.innerHTML = errors.map(e => `<li>${e}</li>`).join('');
    }

    /**
     * Entry point: loads data from data.js, validates, computes stats, renders views.
     */
    function init() {
      try {
        const rawData = window.__BABY_DATA__;
        if (!rawData) {
          throw new Error('No se encontraron datos. Asegurate de que data.js esté en la misma carpeta.');
        }

        // Deep clone base data — nunca mutar el original
        baseData = JSON.parse(JSON.stringify(rawData));

        // Cargar estado persistido desde localStorage
        const saved = loadState();
    if (saved) {
      currentOverrides = saved.overrides || {};
      currentNotesOverrides = saved.notesOverrides || {};
      currentCustomItems = saved.customItems || {};

      // Check for data.js version changes
      if (saved.dataVersion && baseData?.meta?.version) {
        if (saved.dataVersion !== baseData.meta.version) {
          console.warn(
            `data.js fue actualizado (v${saved.dataVersion} → v${baseData.meta.version}). ` +
            `Los cambios guardados podrían estar desactualizados.`
          );
        }
      }
    }

        // Fusionar base + overrides + ítems personalizados
        currentData = mergeData(baseData, currentOverrides, currentCustomItems);

        // Step 1: Validate schema
        const validation = validateSchema(currentData);
        if (!validation.valid) {
          showError(validation.errors);
          return;
        }

        // Step 2: Compute stats
        currentStats = computeStats(currentData);

        // Step 3: Set last updated
        const lastUpdatedEl = document.getElementById('lastUpdated');
        if (lastUpdatedEl && currentData.meta && currentData.meta.lastUpdated) {
          lastUpdatedEl.textContent = `Última actualización: ${currentData.meta.lastUpdated}`;
        } else if (lastUpdatedEl && currentData.meta && currentData.meta.generated) {
          lastUpdatedEl.textContent = `Generado: ${currentData.meta.generated}`;
        }

        // Step 4: Render all views
        renderSummaryCards(currentData, currentStats);
        renderCategoryAccordion(currentData, currentStats, currentFilter);
        renderGapAnalysis(currentData, currentStats);
        renderExtras(currentData);

        // Step 5: Wire interactivity
        setupDownloadButton();
        setupFilters();
        setupEventDelegation();

        // Reset button
        const resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
          resetBtn.addEventListener('click', resetAll);
        }

        // Import button
        setupImportButton();

        // Legend toggle
        setupLegendToggle();
      } catch (err) {
        showError([`Error al cargar datos: ${err.message}`]);
        console.error('Init error:', err);
      }
    }

    // ═══ Launch ═══
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
