<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista para Bebé — Leandro José (0 a 6 meses)</title>
  <style>
    /* ═══════════════════════════════════════════
       CSS Custom Properties — Design Tokens
       ═══════════════════════════════════════════ */
    :root {
      /* Stage colors — warm, not alarming */
      --color-pre-birth: #d4a373;
      --color-first-month: #ccd5ae;
      --color-3-6-months: #e9edc9;
      --color-avoid: #d4a37333;

      /* Status colors — soft and natural */
      --color-pendiente: #ccd5ae;
      --color-insuficiente: #faedcd;
      --color-completo: #ccd5ae;
      --color-excedido: #d4a37399;  /* 60% opacity */
      --color-evitar: #e9edc9;

      /* Background and surface */
      --bg: #fefae0;
      --card-bg: #ffffff;
      --card-bg-alt: #e9edc9;

      /* Text */
      --text: #5c4033;  /* dark brown instead of harsh black */
      --text-light: #8b7355;  /* warm brown-gray */
      --text-on-dark: #fefae0;

      /* Borders and dividers */
      --border: #ccd5ae;
      --border-light: #e9edc9;

      /* Interactive */
      --accent: #d4a373;
      --accent-hover: #c1905f;
      --success: #ccd5ae;
      --success-text: #5c4033;
      --warning-bg: #faedcd;
      --warning-border: #d4a373;

      /* Shapes */
      --radius: 14px;
      --radius-sm: 8px;
      --radius-pill: 100px;
      --shadow: 0 2px 12px rgba(212, 163, 115, 0.12);
      --shadow-hover: 0 4px 20px rgba(212, 163, 115, 0.2);

      /* Sizing */
      --touch-target: 48px;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    /* ═══════════════════════════════════════════
       Reset & Base
       ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    body {
      font-family: var(--font-stack);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-width: 320px;
      -webkit-text-size-adjust: 100%;
    }

    /* ═══════════════════════════════════════════
       SVG Icons
       ═══════════════════════════════════════════ */
    .icon {
      width: 20px;
      height: 20px;
      display: inline-block;
      vertical-align: -4px;
      flex-shrink: 0;
      color: var(--accent);
    }
    .icon-lg { width: 28px; height: 28px; vertical-align: -6px; }
    .icon-sm { width: 16px; height: 16px; vertical-align: -3px; }

    .category-icon { margin-right: 8px; }
    .header-icon { color: var(--accent); }

    @media (min-width: 768px) {
      .icon { width: 24px; height: 24px; vertical-align: -5px; }
      .icon-lg { width: 32px; height: 32px; }
    }

    /* Filter stage dot */
    .filter-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════
       Header
       ═══════════════════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      backdrop-filter: blur(8px);
      padding: 16px 16px 8px;
      border-bottom: 1px solid var(--border-light);
      text-align: center;
    }

    header h1 { font-size: 1.125rem; margin-bottom: 0.25rem; }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-light);
    }

    .last-updated {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 0.25rem;
    }

    /* ═══════════════════════════════════════════
       Main Layout
       ═══════════════════════════════════════════ */
    main {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════
       Sections & Cards
       ═══════════════════════════════════════════ */
    section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow);
    }

    section h2 {
      font-size: 1.125rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border-light);
      color: var(--accent);
    }

    /* ═══════════════════════════════════════════
       Error Banner
       ═══════════════════════════════════════════ */
    .error-banner {
      background: var(--warning-bg);
      color: var(--text);
      border: 1px solid var(--warning-border);
      border-radius: var(--radius);
      padding: 1rem;
      margin: 1rem;
      display: none;
    }

    .error-banner.visible { display: block; }

    .error-banner ul {
      margin: 0.5rem 0 0 1.25rem;
      font-size: 0.875rem;
    }

    /* ═══════════════════════════════════════════
       Summary Cards
       ═══════════════════════════════════════════ */
    .card.overall-progress {
      text-align: center;
      padding: 1.25rem;
      margin-bottom: 1rem;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card.overall-progress .progress-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .card.overall-progress .progress-percent {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .card.overall-progress .progress-detail {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 0.25rem;
    }

    .stage-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }

    .stage-card {
      padding: 1rem;
      border-radius: var(--radius);
      border-left: 5px solid;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    .stage-card.pre-birth   { border-left-color: var(--color-pre-birth); background: rgba(212, 163, 115, 0.12); }
    .stage-card.first-month { border-left-color: var(--color-first-month); background: rgba(204, 213, 174, 0.3); }
    .stage-card.\33 -6-months { border-left-color: var(--color-3-6-months); background: rgba(233, 237, 201, 0.4); }
    .stage-card.avoid       { border-left-color: var(--color-avoid); background: rgba(212, 163, 115, 0.06); }

    .stage-card .stage-label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .stage-card .stage-count {
      font-size: 0.75rem;
      color: var(--text-light);
    }

    /* ═══════════════════════════════════════════
       Progress Bars
       ═══════════════════════════════════════════ */
    .progress-bar {
      height: 10px;
      background: var(--border-light);
      border-radius: 5px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .progress-bar .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    .progress-bar .progress-fill.low  { background: linear-gradient(90deg, var(--color-pre-birth), var(--accent)); }
    .progress-bar .progress-fill.mid  { background: linear-gradient(90deg, var(--accent), var(--color-first-month)); }
    .progress-bar .progress-fill.high { background: linear-gradient(90deg, var(--success), var(--accent)); }

    /* ═══════════════════════════════════════════
       Filter Buttons
       ═══════════════════════════════════════════ */
    .filters {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 2px 0;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filters button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      min-height: var(--touch-target);
      transition: all 0.15s ease;
      white-space: nowrap;
      user-select: none;
      touch-action: manipulation;
    }

    .filters button:hover {
      border-color: var(--accent);
      background: var(--card-bg-alt);
    }

    .filters button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════
       Accordion (details/summary)
       ═══════════════════════════════════════════ */
    .category-details {
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      overflow: hidden;
      background: var(--card-bg);
    }

    .category-details summary {
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      min-height: var(--touch-target);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      user-select: none;
      touch-action: manipulation;
    }

    .category-details summary:hover {
      background: var(--card-bg-alt);
    }

    .category-details[open] summary {
      border-bottom: 1px solid var(--border-light);
      background: var(--card-bg-alt);
    }

    .category-details summary::-webkit-details-marker { display: none; }
    .category-details summary::marker { display: none; content: ''; }

    .category-details summary::after {
      content: '▶';
      font-size: 0.7rem;
      margin-left: 0.5rem;
      transition: transform 0.2s ease;
      color: var(--text-light);
    }

    .category-details[open] summary::after {
      transform: rotate(90deg);
    }

    .category-details .category-content {
      padding: 0 1rem 1rem 1rem;
      background: var(--card-bg-alt);
    }

    /* ═══════════════════════════════════════════
       Item Table (scrollable on mobile)
       ═══════════════════════════════════════════ */
    .item-table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .item-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 500px;
    }

    .item-table th {
      text-align: left;
      padding: 0.5rem 0.4rem;
      border-bottom: 2px solid var(--border-light);
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    .item-table td {
      padding: 0.5rem 0.4rem;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }

    .item-table tr:nth-child(even) td {
      background: rgba(233, 237, 201, 0.25);
    }

    .item-table tr:last-child td { border-bottom: none; }

    /* Mobile card layout for tables */
    @media (max-width: 480px) {
      .item-table, .item-table thead, .item-table tbody, 
      .item-table th, .item-table td, .item-table tr {
        display: block;
      }
      .item-table thead { display: none; }
      .item-table { min-width: unset; }
      .item-table tr {
        margin-bottom: 12px;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-sm);
        padding: 12px;
        background: var(--card-bg);
      }
      .item-table td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border: none;
      }
      .item-table td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-light);
        font-size: 11px;
        text-transform: uppercase;
        flex-shrink: 0;
        margin-right: 12px;
      }
      .item-table tr:nth-child(even) td {
        background: transparent;
      }
    }

    /* ═══════════════════════════════════════════
       Status Badges
       ═══════════════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-pill);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
      color: var(--text);
    }

    .badge.pendiente    { background: var(--color-pendiente); color: var(--text); }
    .badge.insuficiente { background: var(--color-insuficiente); color: var(--text); }
    .badge.completo     { background: var(--color-completo); color: var(--success-text); }
    .badge.excedido     { background: var(--color-excedido); color: var(--text); }
    .badge.evitar       { background: var(--color-evitar); color: var(--text); text-decoration: line-through; }

    .badge.essential {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      font-size: 0.65rem;
    }

    /* Combo item indicator */
    .combo-indicator {
      display: inline-block;
      font-size: 0.7rem;
      color: var(--text);
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.4rem;
      cursor: help;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* ═══════════════════════════════════════════
       Gap Analysis
       ═══════════════════════════════════════════ */
    .gap-list { list-style: none; }

    .gap-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.9rem;
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
    }

    .gap-item:last-child { border-bottom: none; }

    .gap-item .gap-name    { flex: 1 1 180px; font-weight: 600; }
    .gap-item .gap-cat     { font-size: 0.75rem; color: var(--text-light); }
    .gap-item .gap-qty     { font-size: 0.8rem; font-weight: 600; }
    .gap-item .gap-stage   { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 100px; color: var(--text-on-dark); }

    .gap-item.critical {
      background: var(--warning-bg);
      border-left: 4px solid var(--color-pre-birth);
    }

    .gap-cta {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-weight: 700;
      color: var(--text);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .gap-item.critical .gap-stage { background: var(--color-pre-birth); }
    .gap-item .gap-stage.stage-pre-birth   { background: var(--color-pre-birth); }
    .gap-item .gap-stage.stage-first-month { background: var(--color-first-month); color: var(--text); }
    .gap-item .gap-stage.stage-3-6-months  { background: var(--color-3-6-months); color: var(--text); }

    /* ═══════════════════════════════════════════
       Extras Section
       ═══════════════════════════════════════════ */
    .extra-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .extra-item:last-child { border-bottom: none; }

    .extra-item .extra-name   { flex: 1 1 180px; }
    .extra-item .extra-qty    { font-weight: 600; }
    .extra-item .extra-reason { font-size: 0.8rem; color: var(--text-light); }

    .extras-hidden { display: none; }

    /* ═══════════════════════════════════════════
       Footer & Legend
       ═══════════════════════════════════════════ */
    footer {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border-light);
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #downloadBtn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: var(--text-on-dark);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: var(--touch-target);
      transition: background 0.15s ease;
      touch-action: manipulation;
      user-select: none;
    }

    #downloadBtn:hover { background: var(--accent-hover); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      width: 100%;
    }

    /* ═══════════════════════════════════════════
       Tablet (≥ 768px)
       ═══════════════════════════════════════════ */
    @media (min-width: 768px) {
      html { font-size: 17px; }

      main {
        padding: 1.5rem 2rem;
        gap: 2rem;
      }

      header {
        padding: 18px 2rem 10px;
      }

      header h1 { font-size: 1.5rem; }

      section { padding: 1.5rem; }

      section h2 { font-size: 1.25rem; }

      .stage-cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters button {
        font-size: 0.85rem;
        padding: 10px 20px;
      }
    }

    @media (min-width: 1024px) {
      html { font-size: 18px; }

      main {
        padding: 2rem 3rem;
        gap: 2.5rem;
      }

      header h1 { font-size: 1.75rem; }

      .stage-cards {
        grid-template-columns: repeat(4, 1fr);
      }

      .card.overall-progress { padding: 2rem; }

      .card.overall-progress .progress-percent { font-size: 2.5rem; }

      .gap-item, .extra-item { font-size: 0.95rem; }
    }

    /* ═══════════════════════════════════════════
       Print Styles
       ═══════════════════════════════════════════ */
     @media print {
      .filters, #downloadBtn, #resetBtn, .stepper, .add-item-btn, .add-item-form, .delete-custom-btn, footer, header {
        display: none;
      }

      .category-details { break-inside: avoid; }

      body { background: #fff; color: #000; }

      section {
        box-shadow: none;
        border: 1px solid #ddd;
        break-inside: avoid;
      }

      .stage-cards { grid-template-columns: repeat(2, 1fr); }

      .item-table, .item-table thead, .item-table tbody, 
      .item-table th, .item-table td, .item-table tr {
        display: revert;
      }
      .item-table td::before { content: none; }
      .item-table thead { display: table-header-group; }
    }

    /* ═══════════════════════════════════════════
       Interactive Controls — tracker-interactivo
       ═══════════════════════════════════════════ */

    /* Stepper */
    .stepper { display: inline-flex; align-items: center; gap: 4px; }
    .stepper-btn {
      width: var(--touch-target); height: var(--touch-target);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card-bg);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: all 0.15s ease;
      touch-action: manipulation;
      user-select: none;
    }
    .stepper-btn:hover:not(:disabled) { background: var(--card-bg-alt); border-color: var(--accent); color: var(--accent); }
    .stepper-btn:active:not(:disabled) { transform: scale(0.92); }
    .stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .stepper-value {
      min-width: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
    }
    .stepper-value.has-value { color: var(--accent); }
    .suggested { color: var(--text-light); font-size: 13px; }
    .avoid-text { color: var(--text-light); font-style: italic; font-size: 13px; }
    .combo-qty { color: var(--text-light); font-size: 14px; cursor: help; }

    /* Custom item badge */
    .custom-badge {
      background: var(--accent);
      color: var(--text-on-dark);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      white-space: nowrap;
    }
    .custom-badge .icon { color: var(--text-on-dark); }
    .delete-custom-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      line-height: 1;
      margin-right: 4px;
      transition: transform 0.15s ease;
    }
    .delete-custom-btn:hover { color: var(--accent-hover); transform: scale(1.2); }

    /* Add item form */
    .add-item-btn {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: var(--card-bg);
      border: 1px dashed var(--accent);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      touch-action: manipulation;
    }
    .add-item-btn:hover { background: var(--card-bg-alt); border-color: var(--accent-hover); color: var(--accent-hover); }
    .add-item-form {
      background: var(--card-bg-alt);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 8px;
    }
    .add-item-form input, .add-item-form select {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      box-sizing: border-box;
      background: var(--card-bg);
      color: var(--text);
    }

    /* Reset button */
    .reset-btn {
      background: var(--warning-bg);
      color: var(--text);
      border: 1px solid var(--warning-border);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
      transition: all 0.15s ease;
      touch-action: manipulation;
      user-select: none;
    }
    .reset-btn:hover { background: var(--border-light); border-color: var(--accent); }

    /* Quantity cell alignment */

  <script src="data.js"></script>
  <script>
    /* ═══════════════════════════════════════════
       ──  TASK 2.1: Validation & Status Engine  ──
       ═══════════════════════════════════════════ */

    /**
     * Validates the data.json schema.
     * @param {object} data
     * @returns {{ valid: boolean, errors: string[] }}
     */
    function validateSchema(data) {
      const errors = [];

      if (!data || typeof data !== 'object') {
        return { valid: false, errors: ['El archivo data.js no contiene un objeto válido.'] };
      }

      // Top-level required fields
      const requiredTop = ['meta', 'stages', 'categories', 'extras'];
      for (const field of requiredTop) {
        if (!(field in data)) {
          errors.push(`Falta el campo raíz requerido: "${field}".`);
        }
      }

      // If critical fields are missing, don't validate deeper
      if (!data.stages) {
        return { valid: errors.length === 0, errors };
      }

      // Build set of valid stage IDs
      const stageIds = new Set();
      if (Array.isArray(data.stages)) {
        for (const stage of data.stages) {
          if (stage && stage.id) {
            stageIds.add(stage.id);
          }
        }
      }

      // Validate categories
      if (Array.isArray(data.categories)) {
        const seenIds = new Set();

        for (let ci = 0; ci < data.categories.length; ci++) {
          const cat = data.categories[ci];
          const catLabel = cat.name || cat.id || `categoría #${ci + 1}`;

          // Category required fields
          for (const field of ['id', 'name', 'icon']) {
            if (!(field in cat) || cat[field] === undefined || cat[field] === null) {
              errors.push(`Categoría "${catLabel}": falta el campo "${field}".`);
            }
          }

          if (!Array.isArray(cat.items)) {
            errors.push(`Categoría "${catLabel}": "items" debe ser un array.`);
            continue; // can't validate items further
          }

          // Validate each item
          const itemRequired = ['id', 'name', 'stage', 'suggestedMin', 'suggestedMax', 'essential', 'purchased'];
          for (let ii = 0; ii < cat.items.length; ii++) {
            const item = cat.items[ii];
            const itemLabel = item.name || item.id || `ítem #${ii + 1}`;
            const itemFull = `${catLabel} → ${itemLabel}`;

            for (const field of itemRequired) {
              if (!(field in item)) {
                errors.push(`Ítem "${itemFull}": falta el campo requerido "${field}".`);
              }
            }

            // Validate field types
            if (item.suggestedMin !== undefined && item.suggestedMin !== null && typeof item.suggestedMin !== 'number') {
              errors.push(`Ítem "${itemFull}": "suggestedMin" debe ser un número, no ${typeof item.suggestedMin}.`);
            }
            if (item.suggestedMax !== undefined && item.suggestedMax !== null && typeof item.suggestedMax !== 'number') {
              errors.push(`Ítem "${itemFull}": "suggestedMax" debe ser un número, no ${typeof item.suggestedMax}.`);
            }
            if (item.essential !== undefined && item.essential !== null && typeof item.essential !== 'boolean') {
              errors.push(`Ítem "${itemFull}": "essential" debe ser booleano.`);
            }
            if (item.purchased !== undefined && item.purchased !== null && typeof item.purchased !== 'number') {
              errors.push(`Ítem "${itemFull}": "purchased" debe ser un número.`);
            }

            // Validate stage reference
            if (item.stage && !stageIds.has(item.stage)) {
              errors.push(`Ítem "${itemFull}": la etapa "${item.stage}" no existe en data.stages.`);
            }

            // Validate unique ID across categories
            if (item.id) {
              if (seenIds.has(item.id)) {
                // Duplicate IDs across categories are allowed (shared items), but we log them
                // Actually, per the spec duplicate IDs are fine since they're shared items.
                // We only warn if the same ID appears twice WITHIN the same category.
              }
              seenIds.add(item.id);
            }
          }

          // Check for duplicate IDs within same category
          const catItemIds = cat.items.map(i => i.id).filter(Boolean);
          const catDupes = catItemIds.filter((id, idx) => catItemIds.indexOf(id) !== idx);
          if (catDupes.length > 0) {
            errors.push(`Categoría "${catLabel}": IDs duplicados dentro de la misma categoría: ${[...new Set(catDupes)].join(', ')}.`);
          }
        }
      } else {
        errors.push('"categories" debe ser un array.');
      }

      return { valid: errors.length === 0, errors };
    }

    /**
     * Derives the display status for a single item.
     * Special case: min===0 && max===0 → "evitar" (don't-buy items)
     * @param {{ suggestedMin: number, suggestedMax: number, purchased: number }} item
     * @returns {string} "pendiente" | "insuficiente" | "completo" | "excedido" | "evitar"
     */
    function deriveStatus(item) {
      const min = item.suggestedMin;
      const max = item.suggestedMax;
      const purchased = item.purchased;

      // Special case: avoid items (min=0 AND max=0)
      if (min === 0 && max === 0) return 'evitar';

      // Normal derivation
      if (purchased === 0) return 'pendiente';
      if (purchased < min) return 'insuficiente';
      if (purchased <= max) return 'completo';
      return 'excedido';
    }

    /**
     * Returns a hex color for a given status.
     * @param {string} status
     * @returns {string}
     */
    function statusColor(status) {
      const map = {
        pendiente:    '#9ca3af',
        insuficiente: '#f59e0b',
        completo:     '#16a34a',
        excedido:     '#2563eb',
        evitar:       '#d1d5db'
      };
      return map[status] || '#9ca3af';
    }

    /**
     * Returns the stage priority for sorting (lower = more urgent).
     * @param {string} stageId
     * @param {Array} stages
     * @returns {number}
     */
    function stagePriority(stageId, stages) {
      const stage = stages.find(s => s.id === stageId);
      return stage ? stage.priority : 99;
    }

    /**
     * Computes global and per-category/per-stage statistics.
     * - "evitar" items are excluded from totals
     * - Shared IDs (same id across categories) are counted ONCE in global + byStage totals
     * - Combo items are counted based on their own `purchased` field (comboSource is display-only)
     *
     * @param {object} data
     * @returns {object} { global, byStage, byCategory, gaps }
     */
    function computeStats(data) {
      const stages = data.stages || [];
      const categories = data.categories || [];

      // Build a flat list of all items with their category context
      const allItems = [];
      for (const cat of categories) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          allItems.push({ ...item, _category: cat });
        }
      }

      // ═══ COMBO RESOLUTION: build index + inherit purchased ═══
      const itemById = new Map();
      for (const item of allItems) {
        if (!itemById.has(item.id)) {
          itemById.set(item.id, item);
        }
      }

      // Resolve combo inheritance: sub-items inherit purchased from source
      const resolvedItems = allItems.map(item => {
        if (item.comboSource) {
          const source = itemById.get(item.comboSource);
          if (source && source.purchased > 0) {
            return {
              ...item,
              purchased: source.purchased,
              _comboResolved: true,
              _comboSourceName: source.name
            };
          }
        }
        return item;
      });

      // Derive status for all resolved items
      const itemsWithStatus = resolvedItems.map(item => ({
        ...item,
        _status: deriveStatus(item)
      }));

      // Filter out evitar items (don't count in totals)
      const countableItems = itemsWithStatus.filter(item => item._status !== 'evitar');

      // ═══ GLOBAL STATS (dedup by id) ═══
      const seenGlobal = new Set();
      let globalTotal = 0;
      let globalComplete = 0;
      let globalPending = 0;
      let globalInsufficient = 0;
      let globalExceeded = 0;

      for (const item of countableItems) {
        if (seenGlobal.has(item.id)) continue;
        seenGlobal.add(item.id);
        globalTotal++;

        switch (item._status) {
          case 'completo':     globalComplete++; break;
          case 'pendiente':    globalPending++; break;
          case 'insuficiente': globalInsufficient++; break;
          case 'excedido':     globalExceeded++; break;
        }
      }

      const globalProgress = globalTotal > 0
        ? Math.round((globalComplete / globalTotal) * 100)
        : 0;

      // ═══ BY STAGE (dedup by id within each stage) ═══
      const byStage = {};
      for (const stage of stages) {
        const stageItems = countableItems.filter(item => item.stage === stage.id);
        const seenStage = new Set();
        let sTotal = 0;
        let sComplete = 0;
        let sPending = 0;

        for (const item of stageItems) {
          if (seenStage.has(item.id)) continue;
          seenStage.add(item.id);
          sTotal++;

          switch (item._status) {
            case 'completo':  sComplete++; break;
            case 'pendiente': sPending++; break;
          }
        }

        byStage[stage.id] = {
          label: stage.label,
          color: stage.color,
          priority: stage.priority,
          total: sTotal,
          complete: sComplete,
          pending: sPending,
          progress: sTotal > 0 ? Math.round((sComplete / sTotal) * 100) : 0
        };
      }

      // ═══ BY CATEGORY (no dedup needed — items are unique within a category) ═══
      const byCategory = {};
      for (const cat of categories) {
        if (!Array.isArray(cat.items)) continue;
        const catItems = itemsWithStatus.filter(item => item._category.id === cat.id && item._status !== 'evitar');
        let cTotal = 0;
        let cComplete = 0;
        let cPending = 0;

        for (const item of catItems) {
          cTotal++;
          switch (item._status) {
            case 'completo':  cComplete++; break;
            case 'pendiente': cPending++; break;
          }
        }

        byCategory[cat.id] = {
          name: cat.name,
          icon: cat.icon,
          total: cTotal,
          complete: cComplete,
          pending: cPending,
          progress: cTotal > 0 ? Math.round((cComplete / cTotal) * 100) : 0
        };
      }

      // ═══ GAPS (items with purchased=0, excluding evitar and combo-covered) ═══
      const gaps = countableItems
        .filter(item => item._status === 'pendiente' && !item._comboResolved)
        .map(item => ({
          item: item.name,
          id: item.id,
          category: item._category.name,
          categoryId: item._category.id,
          stage: item.stage,
          missing: item.suggestedMin, // need at least min
          essential: item.essential
        }))
        .sort((a, b) => {
          // Sort by stage priority first
          const pa = stagePriority(a.stage, stages);
          const pb = stagePriority(b.stage, stages);
          if (pa !== pb) return pa - pb;
          // Then essential first
          if (a.essential && !b.essential) return -1;
          if (!a.essential && b.essential) return 1;
          // Then alpha
          return a.item.localeCompare(b.item, 'es');
        });

      // Build name-by-id index for combo tooltip rendering
      const nameById = {};
      for (const [id, item] of itemById) {
        nameById[id] = item.name;
      }

      return { global: { total: globalTotal, complete: globalComplete, pending: globalPending, insufficient: globalInsufficient, exceeded: globalExceeded, progress: globalProgress }, byStage, byCategory, gaps, nameById };
    }


    /* ═══════════════════════════════════════════
       ──  TASK 2.2: Filter/Sort Utilities    ──
       ═══════════════════════════════════════════ */

    /**
     * Filters an array of items by criteria.
     * @param {Array} items
     * @param {{ stage?: string, status?: string, category?: string, essential?: boolean }} filters
     * @returns {Array}
     */
    function filterItems(items, filters) {
      let result = [...items];

      if (filters.stage && filters.stage !== 'all') {
        result = result.filter(item => item.stage === filters.stage);
      }

      if (filters.status) {
        result = result.filter(item => deriveStatus(item) === filters.status);
      }

      if (filters.category) {
        result = result.filter(item => {
          const catId = item._category ? item._category.id : null;
          return catId === filters.category;
        });
      }

      if (filters.essential === true) {
        result = result.filter(item => item.essential === true);
      }

      return result;
    }

    /**
     * Sorts items by a given criterion.
     * @param {Array} items
     * @param {string} sortBy - "stage" | "status" | "name"
     * @param {Array} [stages] - needed for stage priority sort
     * @returns {Array}
     */
    function sortItems(items, sortBy, stages) {
      const sorted = [...items];

      switch (sortBy) {
        case 'stage':
          sorted.sort((a, b) => {
            const pa = stagePriority(a.stage, stages || []);
            const pb = stagePriority(b.stage, stages || []);
            if (pa !== pb) return pa - pb;
            return a.name.localeCompare(b.name, 'es');
          });
          break;

        case 'status': {
          const statusOrder = { pendiente: 0, insuficiente: 1, excedido: 2, completo: 3, evitar: 4 };
          sorted.sort((a, b) => {
            const sa = statusOrder[deriveStatus(a)] ?? 99;
            const sb = statusOrder[deriveStatus(b)] ?? 99;
            if (sa !== sb) return sa - sb;
            return a.name.localeCompare(b.name, 'es');
          });
          break;
        }

        case 'name':
        default:
          sorted.sort((a, b) => a.name.localeCompare(b.name, 'es'));
          break;
      }

      return sorted;
    }

    /**
     * Returns all items (flattened from all categories) for a given stage.
     * @param {object} data
     * @param {string} stageId
     * @returns {Array}
     */
    function getItemsByStage(data, stageId) {
      const result = [];
      for (const cat of data.categories || []) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          if (item.stage === stageId) {
            result.push({ ...item, _category: cat });
          }
        }
      }
      return result;
    }

    let currentData = null;

    let currentFilter = 'all';

    let currentOverrides = {};    // Current localStorage overrides
    let currentCustomItems = {};  // Current custom items

    /* ═══════════════════════════════════════════
       ══  Tracker Interactivo — Constants  ══
       ═══════════════════════════════════════════ */

    const STATUS_LABELS = {
      pendiente: 'pendiente',
      insuficiente: 'insuficiente',
      completo: 'completo',
      excedido: 'excedido',
      evitar: 'evitar'

    /* ═══════════════════════════════════════════
       ──  TASK 1.1: localStorage State Engine  ──
       ═══════════════════════════════════════════ */

    /**
     * Carga el estado desde localStorage.
     * @returns {{ overrides: object, customItems: object, dataVersion: string } | null}
     */
    function loadState() {
      try {
        const raw = localStorage.getItem('lista-bebe-state');
        if (!raw) return null;
        const state = JSON.parse(raw);
        // Validación básica de estructura
        if (!state || typeof state !== 'object') return null;
        return {
          overrides: state.overrides || {},
          customItems: state.customItems || {},
          dataVersion: state.dataVersion || '0.0.0'
        };
      } catch (e) {
        console.warn('localStorage corrupto, descartando:', e.message);
        localStorage.removeItem('lista-bebe-state');
        return null;
      }
    }

    /**
     * Guarda el estado en localStorage.
     * @param {object} overrides
     * @param {object} customItems
     * @param {string} dataVersion
     */
    function saveState(overrides, customItems, dataVersion) {
      try {
        const state = { overrides, customItems, dataVersion };
        localStorage.setItem('lista-bebe-state', JSON.stringify(state));
      } catch (e) {
        console.error('No se pudo guardar en localStorage:', e.message);
      }
    }

    /**
     * Fusiona datos base con overrides e ítems personalizados.
     * IMPORTANTE: primero inyecta ítems personalizados, luego aplica overrides,
     * para que los overrides de ítems personalizados también se apliquen.
     * @param {object} base — datos originales (no se mutan)
     * @param {object} overrides — itemId → purchased count
     * @param {object} customItems — catId → array de ítems personalizados
     * @returns {object} copia fusionada (deep clone)
     */
    function mergeData(base, overrides, customItems) {
      // Deep clone de los datos base
      const merged = JSON.parse(JSON.stringify(base));

      if (!Array.isArray(merged.categories)) return merged;

      // Paso 1: Inyectar ítems personalizados en sus categorías
      for (const [catId, items] of Object.entries(customItems)) {
        if (!Array.isArray(items) || items.length === 0) continue;
        const cat = merged.categories.find(c => c.id === catId);
        if (cat) {
          // Agregar flag _custom a cada ítem personalizado
          const taggedItems = items.map(item => ({ ...item, _custom: true }));
          cat.items.push(...taggedItems);
        } else {
          console.warn(`Categoría "${catId}" no encontrada para items personalizados, ignorando.`);
        }
      }

      // Paso 2: Aplicar overrides a TODOS los ítems (base + personalizados)
      for (const cat of merged.categories) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          if (overrides[item.id] !== undefined) {
            item.purchased = overrides[item.id];
          }
        }
      }

      // Advertir sobre IDs obsoletos (en overrides pero no en ninguna categoría)
      const allIds = new Set();
      for (const cat of merged.categories) {
        for (const item of cat.items) {
          allIds.add(item.id);
        }
      }
      for (const id of Object.keys(overrides)) {
        if (!allIds.has(id)) {
          console.warn(`Override ignorado: item "${id}" ya no existe en data.js`);
        }
      }

      return merged;
    }

    /* ═══════════════════════════════════════════
       ──  TASK 1.2: Change Handlers + Refresh  ──
       ═══════════════════════════════════════════ */

    /**
     * Cambia la cantidad comprada de un ítem.
     * Un solo override cubre todas las instancias compartidas del mismo ID.
     * @param {string} itemId
     * @param {number} delta — incremento positivo (+1) o negativo (−1)
     */
    function changePurchased(itemId, delta) {
      // Buscar el valor base del ítem en baseData
      let basePurchased = 0;
      let found = false;
      for (const cat of (baseData?.categories || [])) {
        for (const item of (cat.items || [])) {
          if (item.id === itemId) {
            basePurchased = item.purchased;
            found = true;
            break;
          }
        }
        if (found) break;
      }

      // Usar el override si existe, sino el valor base
      const current = currentOverrides[itemId] !== undefined
        ? currentOverrides[itemId]
        : basePurchased;

      const newValue = Math.max(0, current + delta);

      // Verificar que el ítem exista en base o en personalizados
      if (!found) {
        for (const items of Object.values(currentCustomItems)) {
          if (items.some(item => item.id === itemId)) {
            found = true;
            break;
          }
        }
      }

      if (!found) {
        console.warn(`Item "${itemId}" no encontrado en ninguna categoría.`);
        return;
      }

      // Guardar override — uno solo cubre todas las instancias compartidas
      currentOverrides[itemId] = newValue;
      saveState(currentOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');

      // Re-render completo
      refreshAll();
    }

    /**
     * Agrega un ítem personalizado a una categoría.
     * @param {string} catId — ID de la categoría
     * @param {object} itemData — { name, suggestedMin, suggestedMax, stage, purchased, essential, notes }
     */
    function addCustomItem(catId, itemData) {
      if (!currentCustomItems[catId]) {
        currentCustomItems[catId] = [];
      }

      const newItem = {
        id: 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
        name: itemData.name,
        suggestedMin: itemData.suggestedMin || 1,
        suggestedMax: itemData.suggestedMax || 1,
        stage: itemData.stage || 'pre-birth',
        purchased: itemData.purchased || 0,
        essential: itemData.essential !== undefined ? itemData.essential : false,
        notes: itemData.notes || '',
        _custom: true
      };

      currentCustomItems[catId].push(newItem);
      saveState(currentOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
      refreshAll();
    }

    /**
     * Elimina un ítem personalizado de una categoría.
     * @param {string} catId — ID de la categoría
     * @param {string} itemId — ID del ítem a eliminar
     */
    function deleteCustomItem(catId, itemId) {
      if (!currentCustomItems[catId]) return;

      currentCustomItems[catId] = currentCustomItems[catId].filter(item => item.id !== itemId);

      // Limpiar arrays de categoría vacíos
      if (currentCustomItems[catId].length === 0) {
        delete currentCustomItems[catId];
      }

      // También eliminar cualquier override para este ítem
      if (currentOverrides[itemId] !== undefined) {
        delete currentOverrides[itemId];
      }

      saveState(currentOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
      refreshAll();
    }

    /**
     * Restablece toda la lista al estado original.
     * Requiere confirmación del usuario.
     */
    function resetAll() {
      if (!confirm('¿Restablecer toda la lista?\n\nSe perderán tus cambios y artículos personalizados. Se recomienda hacer un respaldo primero con "Descargar respaldo".')) {
        return;
      }

      localStorage.removeItem('lista-bebe-state');
      currentOverrides = {};
      currentCustomItems = {};

      // Re-inicializar desde los datos base
      currentData = JSON.parse(JSON.stringify(baseData));
      currentStats = computeStats(currentData);

      renderSummaryCards(currentData, currentStats);
      renderCategoryAccordion(currentData, currentStats, currentFilter);
      renderGapAnalysis(currentData, currentStats);
      renderExtras(currentData);
    }

    /**
     * Reconstruye todas las vistas desde los datos autoritativos fusionados.
     * Llamada después de cada mutación de estado.
     */
    function refreshAll() {
      if (!baseData) return;

      // Fusionar base + overrides + ítems personalizados
      currentData = mergeData(baseData, currentOverrides, currentCustomItems);

      // Recalcular estadísticas
      currentStats = computeStats(currentData);

      // Re-renderizar las 4 vistas
      renderSummaryCards(currentData, currentStats);
      renderCategoryAccordion(currentData, currentStats, currentFilter);
      renderGapAnalysis(currentData, currentStats);
      renderExtras(currentData);

    }

        document.body.removeChild(a);

      const buttons = document.querySelectorAll('#categoryFilters button');
      // Initialize aria-pressed on the active button
      buttons.forEach(btn => {
        btn.setAttribute('aria-pressed', btn.classList.contains('active') ? 'true' : 'false');

      buttons.forEach(btn => {

        });
      });

    }

    /**
     * Procesa el envío del formulario de agregar ítem.
     * @param {string} catId
     */
    function submitAddItem(catId) {
      const nameEl = document.getElementById('form-name-' + catId);
      const qtyEl = document.getElementById('form-qty-' + catId);
      const stageEl = document.getElementById('form-stage-' + catId);
      const notesEl = document.getElementById('form-notes-' + catId);

      const name = nameEl?.value?.trim();
      if (!name) {
        alert('El nombre del ítem es obligatorio.');
        return;
      }

      const itemData = {
        name: name,
        suggestedMin: parseInt(qtyEl?.value) || 1,
        suggestedMax: parseInt(qtyEl?.value) || 1,
        purchased: parseInt(qtyEl?.value) || 0,
        stage: stageEl?.value || 'pre-birth',
        notes: notesEl?.value?.trim() || '',
        essential: false
      };

      addCustomItem(catId, itemData);
      hideAddForm(catId);

      // Clear form
      if (nameEl) nameEl.value = '';
      if (qtyEl) qtyEl.value = '0';
      if (notesEl) notesEl.value = '';
    }

    /**
     * Configura event delegation en #categoryList para todos los controles interactivos.
     */
    function setupEventDelegation() {
      const container = document.getElementById('categoryList');
      if (!container) return;

      container.addEventListener('click', function(e) {
        const btn = e.target.closest('button');
        if (!btn) return;

        const action = btn.dataset.action;
        const itemId = btn.dataset.id;
        const catId = btn.dataset.cat;

        if (action === 'increment') changePurchased(itemId, +1);
        else if (action === 'decrement') changePurchased(itemId, -1);
        else if (action === 'delete-custom') deleteCustomItem(catId, itemId);
        else if (action === 'add-item') showAddForm(catId);
        else if (action === 'submit-add') submitAddItem(catId);
        else if (action === 'cancel-add') hideAddForm(catId);
      });
    }

    /**
     * Displays a validation error banner.
     */
    function showError(errors) {
      const banner = document.getElementById('errorBanner');
      const list = document.getElementById('errorList');
      if (!banner || !list) return;

      banner.classList.add('visible');
      list.innerHTML = errors.map(e => `<li>${e}</li>`).join('');
    }

    /**
     * Entry point: loads data from data.js, validates, computes stats, renders views.
     */
    function init() {
      try {
        const rawData = window.__BABY_DATA__;
        if (!rawData) {
          throw new Error('No se encontraron datos. Asegurate de que data.js esté en la misma carpeta.');
        }

        // Deep clone base data — nunca mutar el original
        baseData = JSON.parse(JSON.stringify(rawData));

        // Cargar estado persistido desde localStorage
        const saved = loadState();
    if (saved) {
      currentOverrides = saved.overrides || {};
      currentCustomItems = saved.customItems || {};

      // Check for data.js version changes
      if (saved.dataVersion && baseData?.meta?.version) {
        if (saved.dataVersion !== baseData.meta.version) {
          console.warn(
            `data.js fue actualizado (v${saved.dataVersion} → v${baseData.meta.version}). ` +
            `Los cambios guardados podrían estar desactualizados.`
          );
        }
      }
    }

        // Fusionar base + overrides + ítems personalizados
        currentData = mergeData(baseData, currentOverrides, currentCustomItems);

        // Step 1: Validate schema
        const validation = validateSchema(currentData);
        if (!validation.valid) {
          showError(validation.errors);
          return;
        }

        // Step 2: Compute stats
        currentStats = computeStats(currentData);

        // Step 3: Set last updated
        const lastUpdatedEl = document.getElementById('lastUpdated');
        if (lastUpdatedEl && currentData.meta && currentData.meta.lastUpdated) {
          lastUpdatedEl.textContent = `Última actualización: ${currentData.meta.lastUpdated}`;
        } else if (lastUpdatedEl && currentData.meta && currentData.meta.generated) {
          lastUpdatedEl.textContent = `Generado: ${currentData.meta.generated}`;
        }

        // Step 4: Render all views
        renderSummaryCards(currentData, currentStats);
        renderCategoryAccordion(currentData, currentStats, currentFilter);
        renderGapAnalysis(currentData, currentStats);
        renderExtras(currentData);

        // Step 5: Wire interactivity
        setupDownloadButton();
        setupFilters();
        setupEventDelegation();

        // Reset button
        const resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
          resetBtn.addEventListener('click', resetAll);
        }
      } catch (err) {
        showError([`Error al cargar datos: ${err.message}`]);
        console.error('Init error:', err);
      }
    }

    // ═══ Launch ═══
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
