<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista para Bebé — Leandro José (0 a 12 meses)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

    /* ═══════════════════════════════════════════
       CSS Custom Properties — Design Tokens
       ═══════════════════════════════════════════ */
    :root {
  /* Background and Surface */
  --bg: #F4F1DE;                              /* Main page background (cream) */
  --card-bg: #FFFFFF;                           /* Card/section background */
  --card-bg-alt: rgba(242, 204, 143, 0.15);    /* Secondary/hover backgrounds (transparent golden) */
  
  /* Text */
  --text: #3D405B;                              /* Primary text & strong borders (dark slate blue) */
  --text-light: rgba(61, 64, 91, 0.6);         /* Secondary text / subtitles */
  --text-on-dark: #FFFFFF;                      /* Text on dark backgrounds */
  
  /* Stage colors */
  --color-pre-birth: #E07A5F;                   /* Terracotta — urgent */
  --color-first-month: #81B29A;                 /* Sage green — soon */
   --color-3-6-months: #F2CC8F;                 /* Golden/amber — later */
   --color-6-9-months: #eab308;                 /* Yellow — 6-9 months */
   --color-9-12-months: #84cc16;                /* Lime — 9-12 months */
   --color-avoid: rgba(61, 64, 91, 0.15);       /* Muted slate — don't buy */
  
  /* Status colors */
  --color-pendiente: #F2CC8F;                   /* Golden — pending */
  --color-insuficiente: #F2CC8F;                /* Golden — insufficient (same as pending, can be distinguished by text) */
  --color-completo: #81B29A;                    /* Sage green — complete */
  --color-excedido: #E07A5F;                    /* Terracotta — exceeded */
  --color-evitar: rgba(61, 64, 91, 0.08);      /* Very muted — avoid */
  
  /* Interactive */
  --accent: #E07A5F;                            /* Primary accent, buttons, alerts, reset */
  --accent-hover: #c96a50;                      /* Darker terracotta for hover */
  --success: #81B29A;                           /* Success state, + button */
  --success-hover: #6b9a82;                     /* Darker sage for hover */
  --success-text: #FFFFFF;                      /* Text on success backgrounds */
  --warning-bg: #F2CC8F;                        /* Playful details, 3-6 months stage, icon backgrounds */
  --warning-border: #E07A5F;                    /* Alert/CTA borders */
  
  /* Borders and dividers */
  --border: rgba(61, 64, 91, 0.12);             /* Subtle border */
  --border-light: rgba(61, 64, 91, 0.06);       /* Very subtle border */
  
  /* Shapes */
  --radius: 14px;
  --radius-sm: 8px;
  --radius-pill: 100px;
  --shadow: 0 2px 12px rgba(61, 64, 91, 0.08);  /* Shadow based on slate blue */
  --shadow-hover: 0 4px 20px rgba(61, 64, 91, 0.12);
  
  /* Sizing */
  --touch-target: 48px;
  --font-stack: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ═══════════════════════════════════════════
       Reset & Base
       ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    body {
      font-family: var(--font-stack);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-width: 320px;
      -webkit-text-size-adjust: 100%;
    }

    /* ═══════════════════════════════════════════
       SVG Icons
       ═══════════════════════════════════════════ */
    .icon {
      width: 20px;
      height: 20px;
      display: inline-block;
      vertical-align: -4px;
      flex-shrink: 0;
      color: var(--accent);
    }
    .icon-lg { width: 28px; height: 28px; vertical-align: -6px; }
    .icon-sm { width: 16px; height: 16px; vertical-align: -3px; }

    .category-icon { margin-right: 8px; }
    .header-icon { color: var(--accent); }

    @media (min-width: 768px) {
      .icon { width: 24px; height: 24px; vertical-align: -5px; }
      .icon-lg { width: 32px; height: 32px; }
    }

    /* Filter stage dot */
    .filter-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .filter-label {
      white-space: nowrap;
    }

    .filter-stage-progress {
      display: inline-block;
      width: 32px;
      height: 6px;
      background: var(--border-light);
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      overflow: hidden;
      flex-shrink: 0;
    }
    .filter-stage-progress .fsp-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .filter-stage-progress .fsp-fill.low  { background: var(--accent); }
    .filter-stage-progress .fsp-fill.mid  { background: var(--success); }
    .filter-stage-progress .fsp-fill.high { background: var(--success-hover); }

    /* ═══════════════════════════════════════════
       Header
       ═══════════════════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      backdrop-filter: blur(8px);
      padding: 16px 16px 8px;
      border-bottom: 1px solid var(--border-light);
      text-align: center;
    }

    header h1 { font-size: 1.125rem; margin-bottom: 0.25rem; }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-light);
    }

    .last-updated {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 0.25rem;
    }

    /* ═══════════════════════════════════════════
       Main Layout
       ═══════════════════════════════════════════ */
    main {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════
       Sections & Cards
       ═══════════════════════════════════════════ */
    section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow);
    }

    section h2 {
      font-size: 1.125rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border-light);
      color: var(--text);
    }

    /* ═══════════════════════════════════════════
       Error Banner
       ═══════════════════════════════════════════ */
    .error-banner {
      background: rgba(224, 122, 95, 0.1);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem;
      margin: 1rem;
      display: none;
    }

    .error-banner.visible { display: block; }

    .error-banner ul {
      margin: 0.5rem 0 0 1.25rem;
      font-size: 0.875rem;
    }

    /* ═══════════════════════════════════════════
       Progress Bars (used in category accordions)
       ═══════════════════════════════════════════ */
    .progress-bar {
      height: 10px;
      background: var(--border-light);
      border-radius: 5px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .progress-bar .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    .progress-bar .progress-fill.low  { background: linear-gradient(90deg, var(--accent), var(--color-pre-birth)); }
    .progress-bar .progress-fill.mid  { background: linear-gradient(90deg, var(--accent), var(--success)); }
    .progress-bar .progress-fill.high { background: linear-gradient(90deg, var(--success), var(--success-hover)); }

    /* ═══════════════════════════════════════════
       Filter Buttons
       ═══════════════════════════════════════════ */
    .filters {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 2px 0;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filters button {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      min-height: var(--touch-target);
      transition: all 0.15s ease;
      white-space: nowrap;
      user-select: none;
      touch-action: manipulation;
      display: inline-flex;
      align-items: center;
    }

    .filters button:hover {
      border-color: var(--accent);
      background: var(--card-bg-alt);
    }

    .filters button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════
       Accordion (details/summary)
       ═══════════════════════════════════════════ */
    .category-details {
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      overflow: hidden;
      background: var(--card-bg);
    }

    .category-details summary {
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      min-height: var(--touch-target);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      user-select: none;
      touch-action: manipulation;
    }

    .category-details summary:hover {
      background: var(--card-bg-alt);
    }

    .category-details[open] summary {
      border-bottom: 1px solid var(--border-light);
      background: var(--card-bg-alt);
    }

    .category-details summary::-webkit-details-marker { display: none; }
    .category-details summary::marker { display: none; content: ''; }

    .category-details summary::after {
      content: '▶';
      font-size: 0.7rem;
      margin-left: 0.5rem;
      transition: transform 0.2s ease;
      color: var(--text-light);
    }

    .category-details[open] summary::after {
      transform: rotate(90deg);
    }

    .category-details .category-content {
      padding: 0 1rem 1rem 1rem;
      background: var(--card-bg-alt);
    }

    /* ═══════════════════════════════════════════
       Item Table (scrollable on mobile)
       ═══════════════════════════════════════════ */
    .item-table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .item-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 500px;
    }

    .item-table th {
      text-align: left;
      padding: 0.5rem 0.4rem;
      border-bottom: 2px solid var(--border-light);
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    .item-table td {
      padding: 0.5rem 0.4rem;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }

    .item-table tr:nth-child(even) td {
      background: rgba(242, 204, 143, 0.06);
    }

    .item-table tr:last-child td { border-bottom: none; }

    /* Mobile card layout for tables */
    @media (max-width: 480px) {
      .item-table, .item-table thead, .item-table tbody, 
      .item-table th, .item-table td, .item-table tr {
        display: block;
      }
      .item-table thead { display: none; }
      .item-table { min-width: unset; }
      .item-table tr {
        margin-bottom: 12px;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-sm);
        padding: 12px;
        background: var(--card-bg);
      }
      .item-table td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border: none;
      }
      .item-table td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-light);
        font-size: 11px;
        text-transform: uppercase;
        flex-shrink: 0;
        margin-right: 12px;
      }
      .item-table tr:nth-child(even) td {
        background: transparent;
      }
    }

    /* ═══════════════════════════════════════════
       Status Badges
       ═══════════════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-pill);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
      color: var(--text);
    }

    .badge.pendiente    { background: var(--warning-bg); color: var(--text); }
    .badge.insuficiente { background: var(--warning-bg); color: var(--text); }
    .badge.completo     { background: var(--success); color: var(--success-text); }
    .badge.excedido     { background: var(--accent); color: var(--text-on-dark); }
    .badge.evitar       { background: var(--color-evitar); color: var(--text-light); text-decoration: line-through; }

    .badge.essential {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      font-size: 0.65rem;
    }

    /* Combo item indicator */
    .combo-indicator {
      display: inline-block;
      font-size: 0.7rem;
      color: var(--text);
      background: rgba(242, 204, 143, 0.3);
      border: 1px solid var(--warning-bg);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.4rem;
      cursor: help;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* ═══════════════════════════════════════════
       Gap Analysis
       ═══════════════════════════════════════════ */
    .gap-list { list-style: none; }

    .gap-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.9rem;
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
    }

    .gap-item:last-child { border-bottom: none; }

    .gap-item .gap-name    { flex: 1 1 180px; font-weight: 600; }
    .gap-item .gap-cat     { font-size: 0.75rem; color: var(--text-light); }
    .gap-item .gap-qty     { font-size: 0.8rem; font-weight: 600; }
    .gap-item .gap-stage   { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 100px; color: var(--text-on-dark); }

    .gap-item.critical {
      background: var(--warning-bg);
      border-left: 4px solid var(--color-pre-birth);
    }

    .gap-cta {
      background: rgba(224, 122, 95, 0.08);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-weight: 700;
      color: var(--accent);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .gap-item.critical .gap-stage { background: var(--color-pre-birth); }
    .gap-item .gap-stage.stage-pre-birth   { background: var(--color-pre-birth); }
    .gap-item .gap-stage.stage-first-month { background: var(--color-first-month); color: var(--text); }
    .gap-item .gap-stage.stage-3-6-months  { background: var(--color-3-6-months); color: var(--text); }
    .gap-item .gap-stage.stage-6-9-months  { background: var(--color-6-9-months); color: var(--text); }
    .gap-item .gap-stage.stage-9-12-months  { background: var(--color-9-12-months); color: var(--text); }

    /* ═══════════════════════════════════════════
       Extras Section
       ═══════════════════════════════════════════ */
    .extra-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .extra-item:last-child { border-bottom: none; }

    .extra-item .extra-name   { flex: 1 1 180px; }
    .extra-item .extra-qty    { font-weight: 600; }
    .extra-item .extra-reason { font-size: 0.8rem; color: var(--text-light); }

    .extras-hidden { display: none; }

    /* ═══════════════════════════════════════════
       Footer & Legend
       ═══════════════════════════════════════════ */
    footer {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-light);
      padding: 8px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      align-items: center;
      z-index: 100;
      font-size: 0.8rem;
    }

    .footer-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .footer-btn {
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
      transition: all 0.15s ease;
      touch-action: manipulation;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    #downloadBtn {
      background: var(--success);
      color: var(--text-on-dark);
      border: 1px solid var(--success);
    }
    #downloadBtn:hover { background: var(--success-hover); }

    #importBtn {
      background: var(--card-bg);
      color: var(--success);
      border: 1px solid var(--success);
    }
    #importBtn:hover { background: rgba(129, 178, 154, 0.08); }

    #resetBtn {
      background: rgba(224, 122, 95, 0.06);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    #resetBtn:hover { background: rgba(224, 122, 95, 0.12); }

    #toggleLegend {
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 4px 8px;
    }
    #toggleLegend:hover { color: var(--text); }

    /* Save toast */
    .save-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 8px 20px;
      border-radius: var(--radius-pill);
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(61, 64, 91, 0.2);
    }
    .save-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Delete item button */
    .delete-item-btn:hover, .delete-item-btn:focus {
      color: var(--accent) !important;
      opacity: 1 !important;
      transform: scale(1.2);
    }

    /* Note cell editable */
    .note-cell:hover { color: var(--text) !important; }
    .note-cell:hover .note-text { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease;
      padding: 0;
    }
    .legend.visible {
      max-height: 60px;
      padding: 4px 0 0;
    }

    @media (min-width: 600px) {
      .legend {
        max-height: 60px;
        padding: 4px 0 0;
      }
      #toggleLegend { display: none; }
    }

    @media print {
      .filters, #downloadBtn, #resetBtn, #importBtn, #toggleLegend,
      .stepper, .add-item-btn, .add-item-form, .delete-custom-btn, footer, header {
        display: none;
      }

    #downloadBtn {
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--success);
      border-radius: var(--radius-pill);
      background: var(--success);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: var(--touch-target);
      transition: background 0.15s ease;
      touch-action: manipulation;
      user-select: none;
    }

    #downloadBtn:hover { background: var(--success-hover); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      width: 100%;
    }

    /* ═══════════════════════════════════════════
       Tablet (≥ 768px)
       ═══════════════════════════════════════════ */
    @media (min-width: 768px) {
      html { font-size: 17px; }

      main {
        padding: 1.5rem 2rem;
        gap: 2rem;
      }

      header {
        padding: 18px 2rem 10px;
      }

      header h1 { font-size: 1.5rem; }

      section { padding: 1.5rem; }

      section h2 { font-size: 1.25rem; }

      .stage-cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters button {
        font-size: 0.85rem;
        padding: 10px 18px;
      }
    }

    @media (min-width: 1024px) {
      html { font-size: 18px; }

      main {
        padding: 2rem 3rem;
        gap: 2.5rem;
      }

      header h1 { font-size: 1.75rem; }

      .stage-cards {
        grid-template-columns: repeat(4, 1fr);
      }

      .card.overall-progress { padding: 2rem; }

      .card.overall-progress .progress-percent { font-size: 2.5rem; }

      .gap-item, .extra-item { font-size: 0.95rem; }
    }

    /* ═══════════════════════════════════════════
       Print Styles
       ═══════════════════════════════════════════ */
     @media print {
      .filters, #downloadBtn, #resetBtn, .stepper, .add-item-btn, .add-item-form, .delete-custom-btn, footer, header {
        display: none;
      }

      .category-details { break-inside: avoid; }

      body { background: #fff; color: #000; }

      section {
        box-shadow: none;
        border: 1px solid #ddd;
        break-inside: avoid;
      }

      .stage-cards { grid-template-columns: repeat(2, 1fr); }

      .item-table, .item-table thead, .item-table tbody, 
      .item-table th, .item-table td, .item-table tr {
        display: revert;
      }
      .item-table td::before { content: none; }
      .item-table thead { display: table-header-group; }
    }

    /* ═══════════════════════════════════════════
       Compact Progress Bar (in header)
       ═══════════════════════════════════════════ */
    .compact-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding: 0 4px;
    }
    .compact-progress-bar {
      flex: 1;
      height: 10px;
      background: var(--border-light);
      border-radius: 5px;
      overflow: hidden;
    }
    .compact-progress-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    .compact-progress-fill.low  { background: linear-gradient(90deg, var(--accent), var(--color-pre-birth)); }
    .compact-progress-fill.mid  { background: linear-gradient(90deg, var(--accent), var(--success)); }
    .compact-progress-fill.high { background: linear-gradient(90deg, var(--success), var(--success-hover)); }
    .compact-progress-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      min-width: 3ch;
      text-align: right;
    }

    /* ═══════════════════════════════════════════
       Interactive Controls — tracker-interactivo
       ═══════════════════════════════════════════ */

    /* Stepper — Pill Design */
    .stepper { 
      display: inline-flex; 
      align-items: center; 
      gap: 0;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(61, 64, 91, 0.08);
    }
    .stepper-btn {
      width: 60px; height: 60px;
      border: none;
      background: transparent;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: all 0.15s ease;
      touch-action: manipulation;
      user-select: none;
      line-height: 1;
    }
    .stepper-btn:hover:not(:disabled) { background: rgba(61, 64, 91, 0.05); }
    .stepper-btn:active:not(:disabled) { background: rgba(61, 64, 91, 0.12); transform: scale(0.94); }
    .stepper-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* + button: green filled half-pill */
    .stepper-btn[data-action="increment"] {
      background: var(--success);
      color: white;
      border-radius: 0 40px 40px 0;
    }
    .stepper-btn[data-action="increment"]:hover:not(:disabled) {
      background: var(--success-hover);
    }

    /* − button: left half-pill */
    .stepper-btn[data-action="decrement"] {
      border-radius: 40px 0 0 40px;
    }

    .stepper-value {
      min-width: 44px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 24px;
      color: var(--text);
      background: var(--card-bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .stepper-value.has-value { color: var(--accent); }
    .suggested { color: var(--text-light); font-size: 13px; }
    .avoid-text { color: var(--text-light); font-style: italic; font-size: 13px; }
    .combo-qty { color: var(--text-light); font-size: 14px; cursor: help; }

    /* Custom item badge */
    .custom-badge {
      background: var(--accent);
      color: var(--text-on-dark);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      white-space: nowrap;
    }
    .custom-badge .icon { color: var(--text-on-dark); }
    .delete-custom-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      line-height: 1;
      margin-right: 4px;
      transition: transform 0.15s ease;
    }
    .delete-custom-btn:hover { color: var(--accent-hover); transform: scale(1.2); }

    /* Add item form */
    .add-item-btn {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: rgba(129, 178, 154, 0.08);
      border: 1px dashed var(--success);
      border-radius: var(--radius-sm);
      color: var(--success);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      touch-action: manipulation;
    }
    .add-item-btn:hover { background: rgba(129, 178, 154, 0.15); border-color: var(--success-hover); color: var(--success-hover); }
    .add-item-form {
      background: var(--card-bg-alt);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 8px;
    }
    .add-item-form input, .add-item-form select {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      box-sizing: border-box;
      background: var(--card-bg);
      color: var(--text);
    }

    /* Reset button */
    .reset-btn {
      background: rgba(224, 122, 95, 0.08);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
      transition: all 0.15s ease;
      touch-action: manipulation;
      user-select: none;
    }
    .reset-btn:hover { background: rgba(224, 122, 95, 0.15); border-color: var(--accent-hover); }

    /* Quantity cell alignment */
    .qty-cell { vertical-align: middle; }
    .qty-cell:first-of-type { white-space: nowrap; }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .stepper-btn { width: 40px; height: 40px; font-size: 18px; }
      .stepper-btn[data-action="increment"] { font-size: 20px; }
      .stepper-value { min-width: 28px; height: 40px; font-size: 16px; }
      .custom-badge { font-size: 9px; }
    }
  </style>

  <script>
    /* ═══════════════════════════════════════════
       ──  TASK 2.1: Validation & Status Engine  ──
       ═══════════════════════════════════════════ */

    /**
     * Validates the data.json schema.
     * @param {object} data
     * @returns {{ valid: boolean, errors: string[] }}
     */
    function validateSchema(data) {
      const errors = [];

      if (!data || typeof data !== 'object') {
        return { valid: false, errors: ['El archivo data.js no contiene un objeto válido.'] };
      }

      // Top-level required fields
      const requiredTop = ['meta', 'stages', 'categories', 'extras'];
      for (const field of requiredTop) {
        if (!(field in data)) {
          errors.push(`Falta el campo raíz requerido: "${field}".`);
        }
      }

      // If critical fields are missing, don't validate deeper
      if (!data.stages) {
        return { valid: errors.length === 0, errors };
      }

      // Build set of valid stage IDs
      const stageIds = new Set();
      if (Array.isArray(data.stages)) {
        for (const stage of data.stages) {
          if (stage && stage.id) {
            stageIds.add(stage.id);
          }
        }
      }

      // Validate categories
      if (Array.isArray(data.categories)) {
        const seenIds = new Set();

        for (let ci = 0; ci < data.categories.length; ci++) {
          const cat = data.categories[ci];
          const catLabel = cat.name || cat.id || `categoría #${ci + 1}`;

          // Category required fields
          for (const field of ['id', 'name', 'icon']) {
            if (!(field in cat) || cat[field] === undefined || cat[field] === null) {
              errors.push(`Categoría "${catLabel}": falta el campo "${field}".`);
            }
          }

          if (!Array.isArray(cat.items)) {
            errors.push(`Categoría "${catLabel}": "items" debe ser un array.`);
            continue; // can't validate items further
          }

          // Validate each item
          const itemRequired = ['id', 'name', 'stage', 'suggestedMin', 'suggestedMax', 'essential', 'purchased'];
          for (let ii = 0; ii < cat.items.length; ii++) {
            const item = cat.items[ii];
            const itemLabel = item.name || item.id || `ítem #${ii + 1}`;
            const itemFull = `${catLabel} → ${itemLabel}`;

            for (const field of itemRequired) {
              if (!(field in item)) {
                errors.push(`Ítem "${itemFull}": falta el campo requerido "${field}".`);
              }
            }

            // Validate field types
            if (item.suggestedMin !== undefined && item.suggestedMin !== null && typeof item.suggestedMin !== 'number') {
              errors.push(`Ítem "${itemFull}": "suggestedMin" debe ser un número, no ${typeof item.suggestedMin}.`);
            }
            if (item.suggestedMax !== undefined && item.suggestedMax !== null && typeof item.suggestedMax !== 'number') {
              errors.push(`Ítem "${itemFull}": "suggestedMax" debe ser un número, no ${typeof item.suggestedMax}.`);
            }
            if (item.essential !== undefined && item.essential !== null && typeof item.essential !== 'boolean') {
              errors.push(`Ítem "${itemFull}": "essential" debe ser booleano.`);
            }
            if (item.purchased !== undefined && item.purchased !== null && typeof item.purchased !== 'number') {
              errors.push(`Ítem "${itemFull}": "purchased" debe ser un número.`);
            }

            // Validate stage reference
            if (item.stage && !stageIds.has(item.stage)) {
              errors.push(`Ítem "${itemFull}": la etapa "${item.stage}" no existe en data.stages.`);
            }

            // Validate unique ID across categories
            if (item.id) {
              if (seenIds.has(item.id)) {
                // Duplicate IDs across categories are allowed (shared items), but we log them
                // Actually, per the spec duplicate IDs are fine since they're shared items.
                // We only warn if the same ID appears twice WITHIN the same category.
              }
              seenIds.add(item.id);
            }
          }

          // Check for duplicate IDs within same category
          const catItemIds = cat.items.map(i => i.id).filter(Boolean);
          const catDupes = catItemIds.filter((id, idx) => catItemIds.indexOf(id) !== idx);
          if (catDupes.length > 0) {
            errors.push(`Categoría "${catLabel}": IDs duplicados dentro de la misma categoría: ${[...new Set(catDupes)].join(', ')}.`);
          }
        }
      } else {
        errors.push('"categories" debe ser un array.');
      }

      return { valid: errors.length === 0, errors };
    }

    /**
     * Derives the display status for a single item.
     * Special case: min===0 && max===0 → "evitar" (don't-buy items)
     * @param {{ suggestedMin: number, suggestedMax: number, purchased: number }} item
     * @returns {string} "pendiente" | "insuficiente" | "completo" | "excedido" | "evitar"
     */
    function deriveStatus(item) {
      const min = item.suggestedMin;
      const max = item.suggestedMax;
      const purchased = item.purchased;

      // Special case: avoid items (min=0 AND max=0)
      if (min === 0 && max === 0) return 'evitar';

      // Normal derivation
      if (purchased === 0) return 'pendiente';
      if (purchased < min) return 'insuficiente';
      if (purchased <= max) return 'completo';
      return 'excedido';
    }

    /**
     * Returns a hex color for a given status.
     * @param {string} status
     * @returns {string}
     */
    function statusColor(status) {
      const map = {
        pendiente:    '#F2CC8F',
        insuficiente: '#F2CC8F',
        completo:     '#81B29A',
        excedido:     '#E07A5F',
        evitar:       '#e8e9ec'
      };
      return map[status] || '#F2CC8F';
    }

    /**
     * Returns the stage priority for sorting (lower = more urgent).
     * @param {string} stageId
     * @param {Array} stages
     * @returns {number}
     */
    function stagePriority(stageId, stages) {
      const stage = stages.find(s => s.id === stageId);
      return stage ? stage.priority : 99;
    }

    /**
     * Computes global and per-category/per-stage statistics.
     * - "evitar" items are excluded from totals
     * - Shared IDs (same id across categories) are counted ONCE in global + byStage totals
     * - Combo items are counted based on their own `purchased` field (comboSource is display-only)
     *
     * @param {object} data
     * @returns {object} { global, byStage, byCategory, gaps }
     */
    function computeStats(data) {
      const stages = data.stages || [];
      const categories = data.categories || [];

      // Build a flat list of all items with their category context
      const allItems = [];
      for (const cat of categories) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          allItems.push({ ...item, _category: cat });
        }
      }

      // ═══ COMBO RESOLUTION: build index + inherit purchased ═══
      const itemById = new Map();
      for (const item of allItems) {
        if (!itemById.has(item.id)) {
          itemById.set(item.id, item);
        }
      }

      // Resolve combo inheritance: sub-items inherit purchased from source
      const resolvedItems = allItems.map(item => {
        if (item.comboSource) {
          const source = itemById.get(item.comboSource);
          if (source && source.purchased > 0) {
            return {
              ...item,
              purchased: source.purchased,
              _comboResolved: true,
              _comboSourceName: source.name
            };
          }
        }
        return item;
      });

      // Derive status for all resolved items
      const itemsWithStatus = resolvedItems.map(item => ({
        ...item,
        _status: deriveStatus(item)
      }));

      // Filter out evitar items (don't count in totals)
      const countableItems = itemsWithStatus.filter(item => item._status !== 'evitar');

      // ═══ GLOBAL STATS (dedup by id) ═══
      const seenGlobal = new Set();
      let globalTotal = 0;
      let globalComplete = 0;
      let globalPending = 0;
      let globalInsufficient = 0;
      let globalExceeded = 0;

      for (const item of countableItems) {
        if (seenGlobal.has(item.id)) continue;
        seenGlobal.add(item.id);
        globalTotal++;

        switch (item._status) {
          case 'completo':     globalComplete++; break;
          case 'excedido':     globalComplete++; globalExceeded++; break;
          case 'pendiente':    globalPending++; break;
          case 'insuficiente': globalInsufficient++; break;
        }
      }

      const globalProgress = globalTotal > 0
        ? Math.round((globalComplete / globalTotal) * 100)
        : 0;

      // ═══ BY STAGE (dedup by id within each stage) ═══
      const byStage = {};
      for (const stage of stages) {
        const stageItems = countableItems.filter(item => item.stage === stage.id);
        const seenStage = new Set();
        let sTotal = 0;
        let sComplete = 0;
        let sPending = 0;

        for (const item of stageItems) {
          if (seenStage.has(item.id)) continue;
          seenStage.add(item.id);
          sTotal++;

          switch (item._status) {
            case 'completo':  sComplete++; break;
            case 'excedido':  sComplete++; break;
            case 'pendiente': sPending++; break;
          }
        }

        byStage[stage.id] = {
          label: stage.label,
          color: stage.color,
          priority: stage.priority,
          total: sTotal,
          complete: sComplete,
          pending: sPending,
          progress: sTotal > 0 ? Math.round((sComplete / sTotal) * 100) : 0
        };
      }

      // ═══ BY CATEGORY (no dedup needed — items are unique within a category) ═══
      const byCategory = {};
      for (const cat of categories) {
        if (!Array.isArray(cat.items)) continue;
        const catItems = itemsWithStatus.filter(item => item._category.id === cat.id && item._status !== 'evitar');
        let cTotal = 0;
        let cComplete = 0;
        let cPending = 0;

        for (const item of catItems) {
          cTotal++;
          switch (item._status) {
            case 'completo':  cComplete++; break;
            case 'excedido':  cComplete++; break;
            case 'pendiente': cPending++; break;
          }
        }

        byCategory[cat.id] = {
          name: cat.name,
          icon: cat.icon,
          total: cTotal,
          complete: cComplete,
          pending: cPending,
          progress: cTotal > 0 ? Math.round((cComplete / cTotal) * 100) : 0
        };
      }

      // ═══ GAPS (items with purchased=0, excluding evitar, combo-covered, and deduped by id) ═══
      const seenGap = new Set();
      const gaps = countableItems
        .filter(item => item._status === 'pendiente' && !item._comboResolved)
        .filter(item => {
          if (seenGap.has(item.id)) return false;
          seenGap.add(item.id);
          return true;
        })
        .map(item => ({
          item: item.name,
          id: item.id,
          category: item._category.name,
          categoryId: item._category.id,
          stage: item.stage,
          missing: item.suggestedMin, // need at least min
          essential: item.essential
        }))
        .sort((a, b) => {
          // Sort by stage priority first
          const pa = stagePriority(a.stage, stages);
          const pb = stagePriority(b.stage, stages);
          if (pa !== pb) return pa - pb;
          // Then essential first
          if (a.essential && !b.essential) return -1;
          if (!a.essential && b.essential) return 1;
          // Then alpha
          return a.item.localeCompare(b.item, 'es');
        });

      // Build name-by-id index for combo tooltip rendering
      const nameById = {};
      for (const [id, item] of itemById) {
        nameById[id] = item.name;
      }

      return { global: { total: globalTotal, complete: globalComplete, pending: globalPending, insufficient: globalInsufficient, exceeded: globalExceeded, progress: globalProgress }, byStage, byCategory, gaps, nameById };
    }


    /* ═══════════════════════════════════════════
       ──  TASK 2.2: Filter/Sort Utilities    ──
       ═══════════════════════════════════════════ */

    /**
     * Filters an array of items by criteria.
     * @param {Array} items
     * @param {{ stage?: string, status?: string, category?: string, essential?: boolean }} filters
     * @returns {Array}
     */
    function filterItems(items, filters) {
      let result = [...items];

      if (filters.stage && filters.stage !== 'all') {
        result = result.filter(item => item.stage === filters.stage);
      }

      if (filters.status) {
        result = result.filter(item => deriveStatus(item) === filters.status);
      }

      if (filters.category) {
        result = result.filter(item => {
          const catId = item._category ? item._category.id : null;
          return catId === filters.category;
        });
      }

      if (filters.essential === true) {
        result = result.filter(item => item.essential === true);
      }

      return result;
    }

    /**
     * Sorts items by a given criterion.
     * @param {Array} items
     * @param {string} sortBy - "stage" | "status" | "name"
     * @param {Array} [stages] - needed for stage priority sort
     * @returns {Array}
     */
    function sortItems(items, sortBy, stages) {
      const sorted = [...items];

      switch (sortBy) {
        case 'stage':
          sorted.sort((a, b) => {
            const pa = stagePriority(a.stage, stages || []);
            const pb = stagePriority(b.stage, stages || []);
            if (pa !== pb) return pa - pb;
            return a.name.localeCompare(b.name, 'es');
          });
          break;

        case 'status': {
          const statusOrder = { pendiente: 0, insuficiente: 1, excedido: 2, completo: 3, evitar: 4 };
          sorted.sort((a, b) => {
            const sa = statusOrder[deriveStatus(a)] ?? 99;
            const sb = statusOrder[deriveStatus(b)] ?? 99;
            if (sa !== sb) return sa - sb;
            return a.name.localeCompare(b.name, 'es');
          });
          break;
        }

        case 'name':
        default:
          sorted.sort((a, b) => a.name.localeCompare(b.name, 'es'));
          break;
      }

      return sorted;
    }

    /**
     * Returns all items (flattened from all categories) for a given stage.
     * @param {object} data
     * @param {string} stageId
     * @returns {Array}
     */
    function getItemsByStage(data, stageId) {
      const result = [];
      for (const cat of data.categories || []) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          if (item.stage === stageId) {
            result.push({ ...item, _category: cat });
          }
        }
      }
      return result;
    }


    /* ═══════════════════════════════════════════
       ──  TASK 3.1: HTML Shell + Init Logic  ──
       ═══════════════════════════════════════════ */

    let currentData = null;
    let currentStats = null;
    let currentFilter = 'all';
    let baseData = null;          // Original from data.js, never modified
    let currentOverrides = {};    // Current localStorage purchased overrides
    let currentNotesOverrides = {}; // Current localStorage notes overrides
    let currentCustomItems = {};  // Current custom items

    /* ═══════════════════════════════════════════
       ══  Tracker Interactivo — Constants  ══
       ═══════════════════════════════════════════ */

    const STATUS_LABELS = {
      pendiente: 'pendiente',
      insuficiente: 'insuficiente',
      completo: 'completo',
      excedido: 'excedido',
      evitar: 'evitar'
    };

    /* ═══════════════════════════════════════════
       ──  TASK 1.1: localStorage State Engine  ──
       ═══════════════════════════════════════════ */

    /**
     * Carga el estado desde localStorage.
     * @returns {{ overrides: object, customItems: object, dataVersion: string } | null}
     */
    function loadState() {
      try {
        const raw = localStorage.getItem('lista-bebe-state');
        if (!raw) return null;
        const state = JSON.parse(raw);
        // Validación básica de estructura
        if (!state || typeof state !== 'object') return null;
        return {
          overrides: state.overrides || {},
          notesOverrides: state.notesOverrides || {},
          customItems: state.customItems || {},
          dataVersion: state.dataVersion || '0.0.0'
        };
      } catch (e) {
        console.warn('localStorage corrupto, descartando:', e.message);
        localStorage.removeItem('lista-bebe-state');
        return null;
      }
    }

    /**
     * Guarda el estado en localStorage.
     * @param {object} overrides
     * @param {object} customItems
     * @param {string} dataVersion
     */
    function saveState(overrides, notesOverrides, customItems, dataVersion) {
      try {
        const state = { overrides, notesOverrides, customItems, dataVersion };
        localStorage.setItem('lista-bebe-state', JSON.stringify(state));
      } catch (e) {
        console.error('No se pudo guardar en localStorage:', e.message);
      }
    }

    /**
     * Fusiona datos base con overrides e ítems personalizados.
     * IMPORTANTE: primero inyecta ítems personalizados, luego aplica overrides,
     * para que los overrides de ítems personalizados también se apliquen.
     * @param {object} base — datos originales (no se mutan)
     * @param {object} overrides — itemId → purchased count
     * @param {object} customItems — catId → array de ítems personalizados
     * @returns {object} copia fusionada (deep clone)
     */
    function mergeData(base, overrides, customItems) {
      // Deep clone de los datos base
      const merged = JSON.parse(JSON.stringify(base));

      if (!Array.isArray(merged.categories)) return merged;

      // Paso 1: Inyectar ítems personalizados en sus categorías
      for (const [catId, items] of Object.entries(customItems)) {
        if (!Array.isArray(items) || items.length === 0) continue;
        const cat = merged.categories.find(c => c.id === catId);
        if (cat) {
          // Agregar flag _custom a cada ítem personalizado
          const taggedItems = items.map(item => ({ ...item, _custom: true }));
          cat.items.push(...taggedItems);
        } else {
          console.warn(`Categoría "${catId}" no encontrada para items personalizados, ignorando.`);
        }
      }

      // Paso 2: Aplicar overrides a TODOS los ítems (base + personalizados)
      for (const cat of merged.categories) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          if (overrides[item.id] !== undefined) {
            item.purchased = overrides[item.id];
          }
        }
      }

      // Paso 2b: Aplicar notas personalizadas
      for (const cat of merged.categories) {
        if (!Array.isArray(cat.items)) continue;
        for (const item of cat.items) {
          if (currentNotesOverrides[item.id] !== undefined) {
            item.notes = currentNotesOverrides[item.id];
          }
        }
      }

      // Advertir sobre IDs obsoletos (en overrides pero no en ninguna categoría)
      const allIds = new Set();
      for (const cat of merged.categories) {
        for (const item of cat.items) {
          allIds.add(item.id);
        }
      }
      for (const id of Object.keys(overrides)) {
        if (!allIds.has(id)) {
          console.warn(`Override ignorado: item "${id}" ya no existe en data.js`);
        }
      }

      return merged;
    }

    /* ═══════════════════════════════════════════
       ──  TASK 1.2: Change Handlers + Refresh  ──
       ═══════════════════════════════════════════ */

    /**
     * Cambia la cantidad comprada de un ítem.
     * Un solo override cubre todas las instancias compartidas del mismo ID.
     * @param {string} itemId
     * @param {number} delta — incremento positivo (+1) o negativo (−1)
     */
    function changePurchased(itemId, delta) {
      // Buscar el valor base del ítem en baseData
      let basePurchased = 0;
      let found = false;
      let foundCatId = null;
      for (const cat of (baseData?.categories || [])) {
        for (const item of (cat.items || [])) {
          if (item.id === itemId) {
            basePurchased = item.purchased;
            found = true;
            foundCatId = cat.id;
            break;
          }
        }
        if (found) break;
      }

      // Usar el override si existe, sino el valor base
      const current = currentOverrides[itemId] !== undefined
        ? currentOverrides[itemId]
        : basePurchased;

      const newValue = Math.max(0, current + delta);

      // Verificar que el ítem exista en base o en personalizados
      if (!found) {
        for (const items of Object.values(currentCustomItems)) {
          if (items.some(item => item.id === itemId)) {
            found = true;
            break;
          }
        }
      }

      if (!found) {
        console.warn(`Item "${itemId}" no encontrado en ninguna categoría.`);
        return;
      }

      // Guardar override — uno solo cubre todas las instancias compartidas
      currentOverrides[itemId] = newValue;
      saveState(currentOverrides, currentNotesOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');

      // Re-render completo, manteniendo la categoría visible
      refreshAll(foundCatId);
    }

    /**
     * Guarda una nota personalizada para un ítem.
     */
    function saveNote(itemId, noteText) {
      if (noteText && noteText.trim()) {
        currentNotesOverrides[itemId] = noteText.trim();
      } else {
        delete currentNotesOverrides[itemId];
      }
      saveState(currentOverrides, currentNotesOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
      // Nota: no hacemos refreshAll para no perder el foco del input
    }

    /**
     * Agrega un ítem personalizado a una categoría.
     * @param {string} catId — ID de la categoría
     * @param {object} itemData — { name, suggestedMin, suggestedMax, stage, purchased, essential, notes }
     */
    function addCustomItem(catId, itemData) {
      if (!currentCustomItems[catId]) {
        currentCustomItems[catId] = [];
      }

      const newItem = {
        id: 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
        name: itemData.name,
        suggestedMin: itemData.suggestedMin || 1,
        suggestedMax: itemData.suggestedMax || 1,
        stage: itemData.stage || 'pre-birth',
        purchased: itemData.purchased || 0,
        essential: itemData.essential !== undefined ? itemData.essential : false,
        notes: itemData.notes || '',
        _custom: true
      };

      currentCustomItems[catId].push(newItem);
      saveState(currentOverrides, currentNotesOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
      refreshAll(catId);
    }

    /**
     * Elimina un ítem personalizado de una categoría.
     * @param {string} catId — ID de la categoría
     * @param {string} itemId — ID del ítem a eliminar
     */
    function deleteCustomItem(catId, itemId) {
      if (!currentCustomItems[catId]) return;

      currentCustomItems[catId] = currentCustomItems[catId].filter(item => item.id !== itemId);

      // Limpiar arrays de categoría vacíos
      if (currentCustomItems[catId].length === 0) {
        delete currentCustomItems[catId];
      }

      // También eliminar cualquier override para este ítem
      if (currentOverrides[itemId] !== undefined) {
        delete currentOverrides[itemId];
      }

      saveState(currentOverrides, currentNotesOverrides, currentCustomItems, baseData?.meta?.version || '0.0.0');
      refreshAll(catId);
    }

    /**
     * Restablece toda la lista al estado original.
     * Requiere confirmación del usuario.
     */
    function resetAll() {
      if (!confirm('¿Restablecer toda la lista?\n\nSe perderán tus cambios y artículos personalizados. Se recomienda hacer un respaldo primero con "Descargar respaldo".')) {
        return;
      }

      localStorage.removeItem('lista-bebe-state');
      currentOverrides = {};
      currentCustomItems = {};

      // Re-inicializar desde los datos base
      currentData = JSON.parse(JSON.stringify(baseData));
      currentStats = computeStats(currentData);

      renderSummaryCards(currentData, currentStats);
      renderCategoryAccordion(currentData, currentStats, currentFilter);
      renderGapAnalysis(currentData, currentStats);
      renderExtras(currentData);
    }

    /**
     * Reconstruye todas las vistas desde los datos autoritativos fusionados.
     * Llamada después de cada mutación de estado.
     */
    function refreshAll(targetCatId) {
      if (!baseData) return;

      // Guardar qué categorías están abiertas ahora
      const openCats = new Set();
      document.querySelectorAll('.category-details[open]').forEach(d => {
        openCats.add(d.dataset.cat);
      });
      // Si hay categoría objetivo, forzarla abierta
      if (targetCatId) openCats.add(targetCatId);

      // Fusionar base + overrides + ítems personalizados
      currentData = mergeData(baseData, currentOverrides, currentCustomItems);

      // Recalcular estadísticas
      currentStats = computeStats(currentData);

      // Re-renderizar las 4 vistas
      renderSummaryCards(currentData, currentStats);
      renderCategoryAccordion(currentData, currentStats, currentFilter);
      renderGapAnalysis(currentData, currentStats);
      renderExtras(currentData);

      // Restaurar categorías abiertas
      document.querySelectorAll('.category-details').forEach(d => {
        if (openCats.has(d.dataset.cat)) {
          d.setAttribute('open', '');
        }
      });

      // Scroll a la categoría objetivo
      if (targetCatId) {
        setTimeout(() => {
          const target = document.querySelector(`.category-details[data-cat="${targetCatId}"]`);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }, 100);
      }
    }

    /**
     * Renders the summary cards view (stub — will be fully implemented in Task 3.2).
     */
    function renderSummaryCards(data, stats) {
      const compactFill = document.getElementById('compactProgressFill');
      const compactLabel = document.getElementById('compactProgressLabel');

      const g = stats.global;

      // Compact progress bar in header
      if (compactFill && compactLabel) {
        const pctClass = g.progress < 30 ? 'low' : g.progress < 70 ? 'mid' : 'high';
        compactFill.className = 'compact-progress-fill ' + pctClass;
        compactFill.style.width = g.progress + '%';
        compactFill.setAttribute('aria-valuenow', g.progress);
        compactLabel.textContent = g.progress + '%';
      }

      // Render stage progress bars in filter buttons
      const stageIds = ['pre-birth', 'first-month', '3-6-months', '6-9-months', '9-12-months', 'avoid'];
      for (const sid of stageIds) {
        const s = stats.byStage[sid];
        const el = document.getElementById('fp-' + sid);
        if (!s || !el) continue;
        const pctClass = s.progress < 30 ? 'low' : s.progress < 70 ? 'mid' : 'high';
        el.innerHTML = `<span class="fsp-fill ${pctClass}" style="width:${s.progress}%"></span>`;
        el.title = `${s.label}: ${s.complete}/${s.total} completos (${s.progress}%)`;
      }
    }

    /**

    function renderCategoryAccordion(data, stats, filterStage) {

      if (!container) return;

      const allAccordionItems = [];

              </div>
              <div class="item-table-wrapper">
                <table class="item-table">

                  </thead>
                  <tbody>
                    ${items.map(item => {
